name: Cybersecurity Conference Calendar

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conference-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check upcoming cybersecurity conferences
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          DATE=$(date -u +"%Y-%m-%d")

          ALERTS=$(python3 scripts/conference-check.py)

          if echo "$ALERTS" | grep -q "NO_ALERTS"; then
            echo "No conferences in next 60 days — skipping."
            exit 0
          fi

          ALERT_TEXT=$(echo "$ALERTS" | grep "^ALERT=" | sed 's/^ALERT=//' | awk '{print NR". "$0}')

          MSG=$(printf 'CYBERSECURITY CONFERENCE CALENDAR\n%s\n\nUpcoming events (next 60 days):\n\n%s\n\nAction: Register early — some are free or remote!\nCFP submissions build your professional profile.' \
            "$DATE" "$ALERT_TEXT")

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
          echo "Conference calendar sent: $RESPONSE"
