name: Watchdog — HackTheBox Rank Tracker

on:
  schedule:
    - cron: '0 4 * * *'   # 9:45 AM Nepal Time daily (same as GitHub activity)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  htb-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check HackTheBox rank and activity
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          HTB_USER="${{ secrets.HTB_USERNAME }}"
          DATE=$(date -u +"%Y-%m-%d")

          if [ -z "$HTB_USER" ]; then
            echo "HTB_USERNAME secret not set — skipping"
            exit 0
          fi

          # Search HTB user via public API
          PROFILE=$(curl -s --max-time 10 \
            -H "User-Agent: HTB-Tracker/1.0" \
            "https://www.hackthebox.com/api/v4/search/fetch?query=${HTB_USER}&tags=users&page=1" 2>/dev/null || echo '{}')

          USER_DATA=$(echo "$PROFILE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
users = d.get('users', [])
if users:
    u = users[0]
    print(f\"{u.get('name','N/A')}|{u.get('rank','N/A')}|{u.get('points','N/A')}|{u.get('rank_text','N/A')}\")
else:
    print('NOT_FOUND|N/A|N/A|N/A')
" 2>/dev/null || echo "ERROR|N/A|N/A|N/A")

          NAME=$(echo "$USER_DATA" | cut -d'|' -f1)
          RANK=$(echo "$USER_DATA" | cut -d'|' -f2)
          POINTS=$(echo "$USER_DATA" | cut -d'|' -f3)
          RANK_TEXT=$(echo "$USER_DATA" | cut -d'|' -f4)

          if [ "$NAME" = "NOT_FOUND" ] || [ "$NAME" = "ERROR" ]; then
            echo "Could not fetch HTB profile for $HTB_USER"
            exit 0
          fi

          MSG=$(printf '⚔️ HackTheBox Daily Update\n\n👤 User: %s\n🏆 Rank: #%s (%s)\n⭐ Points: %s\n📅 Date: %s\n\n🔗 https://app.hackthebox.com/users/%s' \
            "$NAME" "$RANK" "$RANK_TEXT" "$POINTS" "$DATE" "$RANK")

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
          echo "HTB report sent for $NAME"
