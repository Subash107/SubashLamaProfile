name: GitHub Secret Scanner

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday 9:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"

          PATTERNS=(
            "sk-ant-api"
            "sk-[a-zA-Z0-9]{48}"
            "ghp_[a-zA-Z0-9]{36}"
            "AKIA[A-Z0-9]{16}"
            "AIza[0-9A-Za-z_-]{35}"
            "ya29\.[0-9A-Za-z_-]"
            "eyJhbGciOiJ"
            "password\s*=\s*['\"][^'\"]{8,}"
            "secret\s*=\s*['\"][^'\"]{8,}"
            "api_key\s*=\s*['\"][^'\"]{8,}"
            "private_key"
            "BEGIN RSA PRIVATE"
            "BEGIN EC PRIVATE"
          )

          FOUND=""
          for PATTERN in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -rn --include="*.js" --include="*.py" --include="*.sh" --include="*.yml" --include="*.json" --include="*.env" -E "$PATTERN" 2>/dev/null | grep -v "node_modules" | grep -v ".git" | grep -v "secret-scanner" | head -3 || true)
            if [ -n "$MATCHES" ]; then
              FOUND="${FOUND}Pattern: ${PATTERN}\n${MATCHES}\n\n"
            fi
          done

          if [ -n "$FOUND" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "SECRET SCAN ALERT!\n\nPotential secrets found in your repository:\n\n${FOUND}\nREVIEW IMMEDIATELY and rotate any exposed keys!" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
          else
            echo "Secret scan complete — no issues found."
          fi
