name: Security Headlines Feed

on:
  schedule:
    - cron: '0 3 * * *'   # Daily 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  headlines:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - run: echo "event=${{ github.event_name }}"
      - name: Checkout repository
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch security headlines from RSS feeds
        if: github.event_name != 'push'
        run: |
          python3 scripts/security-headlines-fetch.py

      - name: Commit headlines
        if: github.event_name != 'push'
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add public/data/headlines.json
          git diff --staged --quiet && echo "No new headlines" && exit 0
          git commit -m "chore: update security headlines $(date -u +"%Y-%m-%d")"
          git push
