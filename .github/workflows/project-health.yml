name: Project Health Report

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 9:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run health checks and send Telegram report
        env:
          TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/project-health.py
