name: Project Health Report

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 9:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run health checks and send Telegram report
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          ALERTS=""
          STATUS="✅ All systems healthy"

          # 1. Check portfolio site is up
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://subashlamaprofile.pages.dev/" || echo "000")
          if [ "$HTTP" = "200" ]; then
            SITE_STATUS="✅ Portfolio online (HTTP $HTTP)"
          else
            SITE_STATUS="❌ Portfolio returned HTTP $HTTP"
            ALERTS="${ALERTS}\n⚠ Portfolio site is down (HTTP $HTTP)"
            STATUS="🔴 Issues detected"
          fi

          # 2. Check tracker app is up
          HTTP2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://subashlamaprofile.pages.dev/tracker.html" || echo "000")
          if [ "$HTTP2" = "200" ]; then
            TRACKER_STATUS="✅ CyberSec Tracker online"
          else
            TRACKER_STATUS="❌ Tracker returned HTTP $HTTP2"
            ALERTS="${ALERTS}\n⚠ tracker.html is down (HTTP $HTTP2)"
            STATUS="🔴 Issues detected"
          fi

          # 3. Check bug bounty tracker is up
          HTTP3=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://subashlamaprofile.pages.dev/bugbounty.html" || echo "000")
          if [ "$HTTP3" = "200" ]; then
            BB_STATUS="✅ Bug Bounty Tracker online"
          else
            BB_STATUS="❌ Bug Bounty Tracker returned HTTP $HTTP3"
            ALERTS="${ALERTS}\n⚠ bugbounty.html is down (HTTP $HTTP3)"
            STATUS="🔴 Issues detected"
          fi

          # 4. Check SSL cert expiry
          SSL_EXPIRY=$(echo | openssl s_client -connect subashlamaprofile.pages.dev:443 -servername subashlamaprofile.pages.dev 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2 || echo "unknown")
          if [ "$SSL_EXPIRY" != "unknown" ]; then
            EXPIRY_EPOCH=$(date -d "$SSL_EXPIRY" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
            if [ "$DAYS_LEFT" -lt 14 ]; then
              SSL_STATUS="⚠ SSL expires in ${DAYS_LEFT} days!"
              ALERTS="${ALERTS}\n⚠ SSL cert expiring soon: ${DAYS_LEFT} days"
              STATUS="🔴 Issues detected"
            else
              SSL_STATUS="✅ SSL valid (${DAYS_LEFT} days left)"
            fi
          else
            SSL_STATUS="⚠ Could not check SSL"
          fi

          # 5. Check stats.json freshness
          STATS_AGE="unknown"
          STATS_STATUS="⚠ Could not check"
          if [ -f "public/stats.json" ]; then
            GENERATED=$(python3 -c "import json; d=json.load(open('public/stats.json')); print(d.get('generated',''))" 2>/dev/null || echo "")
            if [ -n "$GENERATED" ]; then
              AGE_DAYS=$(( ( $(date +%s) - $(date -d "$GENERATED" +%s 2>/dev/null || echo $(date +%s)) ) / 86400 ))
              if [ "$AGE_DAYS" -gt 2 ]; then
                STATS_STATUS="⚠ stats.json is ${AGE_DAYS} days old"
                ALERTS="${ALERTS}\n⚠ stats.json outdated (${AGE_DAYS} days). Run Generate Live Stats."
              else
                STATS_STATUS="✅ stats.json current (generated: $GENERATED)"
              fi
            fi
          fi

          # 6. GitHub commit activity this week
          COMMITS=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/users/Subash107/events?per_page=50" | \
            node -e "
const d=require('fs').readFileSync('/dev/stdin','utf8');
try {
  const e=JSON.parse(d);
  const cut=Date.now()-7*86400000;
  const c=e.filter(x=>x&&x.type==='PushEvent'&&new Date(x.created_at)>cut).length;
  console.log(c);
} catch{ console.log(0); }
" 2>/dev/null || echo 0)
          GH_STATUS="📊 GitHub: ${COMMITS} commits this week"

          # Build message
          MSG="🏥 Portfolio Health Report
📅 ${DATE}

${STATUS}

📋 Services:
${SITE_STATUS}
${TRACKER_STATUS}
${BB_STATUS}

🔒 Security:
${SSL_STATUS}

📊 Data:
${STATS_STATUS}
${GH_STATUS}

🔗 https://subashlamaprofile.pages.dev"

          if [ -n "$ALERTS" ]; then
            MSG="${MSG}

🚨 Alerts Requiring Attention:$(printf '%b' "$ALERTS")"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(node -e "process.stdout.write(JSON.stringify(process.env.MSG))" MSG="$MSG")}"

          echo "Health report sent."
          if [ "$STATUS" != "✅ All systems healthy" ]; then
            echo "Issues found — see Telegram for details."
            exit 1
          fi
