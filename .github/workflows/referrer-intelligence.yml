name: Weekly Referrer Intelligence

on:
  schedule:
    - cron: '0 4 * * 5'   # Every Friday 9:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  referrer-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Analyse referrer sources and send report
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          WEEK_AGO=$(date -u -d "-7 days" +"%Y-%m-%d")
          DATE=$(date -u +"%Y-%m-%d")

          ANALYSIS=$(LOG_FILE="download-logs/resume-downloads.txt" WEEK_AGO="$WEEK_AGO" \
            python3 scripts/referrer-analysis.py 2>/dev/null)
          echo "$ANALYSIS"

          TOTAL=$(echo "$ANALYSIS" | grep "^total=" | cut -d= -f2)
          BREAKDOWN=$(echo "$ANALYSIS" | grep -v "^total=")

          if [ "${TOTAL:-0}" -eq 0 ]; then
            echo "No downloads this week — skipping."
            exit 0
          fi

          MSG=$(printf 'REFERRER INTELLIGENCE REPORT\nWeek ending %s\n\nWhere your downloads came from:\n\n%s\n\nTotal downloads this week: %s\n\nTip: Top source = where to focus job search activity.' \
            "$DATE" "$BREAKDOWN" "$TOTAL")

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
          echo "Referrer report sent: $RESPONSE"
