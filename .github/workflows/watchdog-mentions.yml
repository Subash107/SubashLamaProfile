name: Watchdog — GitHub Activity Monitor

on:
  schedule:
    - cron: '0 4 * * *'   # 9:45 AM Nepal Time daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mentions-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check GitHub activity for Subash107
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          GH_USER="Subash107"
          SINCE=$(date -u -d "yesterday" +"%Y-%m-%dT00:00:00Z")

          # Get recent stars on repos
          STARS=$(curl -s "https://api.github.com/users/${GH_USER}/repos?per_page=10&sort=updated" \
            -H "User-Agent: WatchdogBot" 2>/dev/null | \
            python3 -c "
import sys,json
repos=json.load(sys.stdin)
total=sum(r.get('stargazers_count',0) for r in repos)
top=sorted(repos,key=lambda r:r.get('stargazers_count',0),reverse=True)[:3]
print(f'Total stars: {total}')
for r in top:
    print(f'  {r[\"name\"]}: {r[\"stargazers_count\"]} stars')
" 2>/dev/null || echo "Unable to fetch")

          # Get recent public events
          EVENTS=$(curl -s "https://api.github.com/users/${GH_USER}/events/public?per_page=10" \
            -H "User-Agent: WatchdogBot" 2>/dev/null | \
            python3 -c "
import sys,json
from datetime import datetime, timezone
events=json.load(sys.stdin)
since='${SINCE}'
recent=[e for e in events if e.get('created_at','') >= since]
types={}
for e in recent:
    t=e.get('type','Unknown')
    types[t]=types.get(t,0)+1
if types:
    print('Recent activity:')
    for t,c in types.items():
        print(f'  {t}: {c}')
else:
    print('No recent activity')
" 2>/dev/null || echo "No recent activity")

          # Check new followers
          FOLLOWERS=$(curl -s "https://api.github.com/users/${GH_USER}" \
            -H "User-Agent: WatchdogBot" 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Followers: {d.get(\"followers\",0)} | Following: {d.get(\"following\",0)} | Public repos: {d.get(\"public_repos\",0)}')" \
            2>/dev/null || echo "Unable to fetch")

          MSG=$(printf '📊 GitHub Daily Report — %s\n\n👤 github.com/%s\n%s\n\n⭐ Stars\n%s\n\n📅 Activity\n%s' \
            "$(date -u +"%Y-%m-%d")" "$GH_USER" "$FOLLOWERS" "$STARS" "$EVENTS")

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
          echo "GitHub activity report sent"
