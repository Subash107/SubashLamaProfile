name: Watchdog — GitHub Activity Monitor

on:
  schedule:
    - cron: '0 4 * * *'   # 9:45 AM Nepal Time daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mentions-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check GitHub activity for Subash107
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          GH_USER="Subash107"
          DATE=$(date -u +"%Y-%m-%d")

          PROFILE=$(curl -s -H "User-Agent: WatchdogBot" "https://api.github.com/users/${GH_USER}" 2>/dev/null || echo '{}')
          FOLLOWERS=$(echo "$PROFILE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('followers',0))" 2>/dev/null || echo "N/A")
          REPOS=$(echo "$PROFILE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('public_repos',0))" 2>/dev/null || echo "N/A")

          REPOS_DATA=$(curl -s -H "User-Agent: WatchdogBot" "https://api.github.com/users/${GH_USER}/repos?per_page=10&sort=updated" 2>/dev/null || echo '[]')
          TOTAL_STARS=$(echo "$REPOS_DATA" | python3 -c "import sys,json; r=json.load(sys.stdin); print(sum(x.get('stargazers_count',0) for x in r))" 2>/dev/null || echo "0")
          TOP_REPO=$(echo "$REPOS_DATA" | python3 -c "import sys,json; r=json.load(sys.stdin); s=sorted(r,key=lambda x:x.get('stargazers_count',0),reverse=True); print(s[0]['name']+' ('+str(s[0].get('stargazers_count',0))+' stars)') if s else print('N/A')" 2>/dev/null || echo "N/A")

          EVENTS=$(curl -s -H "User-Agent: WatchdogBot" "https://api.github.com/users/${GH_USER}/events/public?per_page=10" 2>/dev/null || echo '[]')
          EVENT_SUMMARY=$(echo "$EVENTS" | python3 -c "import sys,json; e=json.load(sys.stdin); t={}; [t.update({x.get('type','?'):t.get(x.get('type','?'),0)+1}) for x in e[:10]]; print(', '.join(f'{k}:{v}' for k,v in list(t.items())[:4])) if t else print('No activity')" 2>/dev/null || echo "No activity")

          MSG=$(printf '📊 GitHub Daily Report\n\n👤 github.com/%s\nDate: %s\n\nStats:\n  Followers: %s\n  Public repos: %s\n  Total stars: %s\n  Top repo: %s\n\nRecent activity:\n  %s' \
            "$GH_USER" "$DATE" "$FOLLOWERS" "$REPOS" "$TOTAL_STARS" "$TOP_REPO" "$EVENT_SUMMARY")

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
          echo "GitHub activity report sent"
