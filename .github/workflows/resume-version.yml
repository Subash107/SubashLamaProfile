name: Resume Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      reason:
        description: 'What changed in the resume'
        required: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - run: echo "event=${{ github.event_name }}"
      - name: Checkout repository
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Bump version
        if: github.event_name != 'push'
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          TODAY="$TODAY" BUMP="$BUMP" python3 scripts/resume-version-bump.py

      - name: Commit version bump
        if: github.event_name != 'push'
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add public/data/resume-version.json
          git diff --staged --quiet && echo "No change" && exit 0
          VERSION=$(python3 -c "import json; print(json.load(open('public/data/resume-version.json'))['version'])")
          git commit -m "chore: resume version bump to v${VERSION} — ${{ inputs.reason }}"
          git push

      - name: Telegram notification
        if: github.event_name != 'push'
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('public/data/resume-version.json'))['version'])")
          MSG=$(printf 'Resume Version Bumped!\n\nNew version : v%s\nBump type   : %s\nReason      : %s\n\nBadge on portfolio will update on next page load.' \
            "$VERSION" "${{ inputs.bump }}" "${REASON:-not specified}")
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
