name: Daily Resume Download Digest

on:
  schedule:
    - cron: '15 3 * * *'   # Daily 9:00 AM Nepal Time (UTC+5:45)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build and send daily digest
        shell: bash
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT" ]; then
            echo "ERROR: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret is not set."
            exit 1
          fi

          LOG="download-logs/resume-downloads.txt"
          TODAY=$(date -u +"%Y-%m-%d")

          if [ ! -f "$LOG" ]; then
            MSG=$(printf 'Daily Resume Digest — %s\n\nToday    : 0 downloads\nThis week: 0 downloads\nAll time : 0 downloads\n\nNo resume downloads recorded yet.\nShare your portfolio link to get your first download!' \
              "$TODAY")
          else
            TODAY_COUNT=$(grep -c "^${TODAY}" "$LOG" 2>/dev/null || echo 0)
            TOTAL=$(grep -c "^[0-9]" "$LOG" 2>/dev/null || echo 0)

            WEEK_COUNT=0
            for i in $(seq 0 6); do
              DAY=$(date -u -d "-${i} days" +"%Y-%m-%d" 2>/dev/null || date -u -v-${i}d +"%Y-%m-%d")
              COUNT=$(grep -c "^${DAY}" "$LOG" 2>/dev/null || echo 0)
              WEEK_COUNT=$((WEEK_COUNT + COUNT))
            done

            TOP=$(grep -E "^$(date -u +"%Y-%m")" "$LOG" 2>/dev/null | \
              awk -F'|' '{print $3}' | \
              awk -F',' '{print $NF}' | \
              tr -d ' ' | sort | uniq -c | sort -rn | head -3 | \
              awk '{print "  " $2 ": " $1}' | tr '\n' ',' | sed 's/,$//')

            MSG=$(printf 'Daily Resume Digest — %s\n\nToday    : %s downloads\nThis week: %s downloads\nAll time : %s downloads\n\nTop countries this month:\n%s\n\nFull log: https://github.com/Subash107/SubashLamaProfile/blob/main/download-logs/resume-downloads.txt' \
              "$TODAY" "$TODAY_COUNT" "$WEEK_COUNT" "$TOTAL" "${TOP:-  No data yet}")
          fi

          # Query worker for today's bot/human stats
          WORKER_URL="https://lingering-surf-6d77.lamasubash107.workers.dev"
          STATS=$(curl -s --max-time 5 "${WORKER_URL}/daily-stats" 2>/dev/null || echo "{}")
          HUMAN_COUNT=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('humanCount',0))" 2>/dev/null || echo "?")
          BOT_COUNT=$(echo "$STATS"   | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('botCount',0))"   2>/dev/null || echo "?")
          SHARE_COUNT=$(echo "$STATS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('shareCount',0))" 2>/dev/null || echo "?")

          STATS_LINE=$(printf '\nVisitor Stats Today:\n  Humans : %s\n  Bots   : %s\n  Shares : %s (link previews)' \
            "$HUMAN_COUNT" "$BOT_COUNT" "$SHARE_COUNT")
          MSG="${MSG}${STATS_LINE}"

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")

          echo "Telegram response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import json,sys; r=json.load(sys.stdin); exit(0 if r.get('ok') else 1)" || {
            echo "ERROR: Telegram API rejected the message."
            exit 1
          }
          echo "SUCCESS: Daily digest sent to Telegram."
