name: Watchdog — MITRE ATT&CK / CISA Daily Brief

on:
  schedule:
    - cron: '45 3 * * *'   # 9:30 AM Nepal Time daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mitre-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch CISA Known Exploited Vulnerabilities + send brief
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          DATE=$(date -u +"%Y-%m-%d")
          YESTERDAY=$(date -u -d "yesterday" +"%Y-%m-%d")

          # Fetch CISA KEV catalog
          KEV=$(curl -s --max-time 15 "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json" 2>/dev/null || echo '{}')

          # Get new entries added yesterday
          NEW_ENTRIES=$(echo "$KEV" | python3 -c "import sys,json; d=json.load(sys.stdin); y=sys.argv[1]; recent=[v for v in d.get('vulnerabilities',[]) if v.get('dateAdded','')>=y][:5]; [print(f'  {v.get(\"cveID\",\"N/A\")} - {v.get(\"vendorProject\",\"N/A\")} {v.get(\"product\",\"N/A\")}: {v.get(\"shortDescription\",\"\")[:80]}') for v in recent] if recent else print('  No new entries today')" "$YESTERDAY" \
            2>/dev/null || echo "  Could not fetch KEV data")

          TOTAL=$(echo "$KEV" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('vulnerabilities',[])))" 2>/dev/null || echo "N/A")

          MSG=$(printf '🛡️ CISA KEV Daily Brief - %s\n\nNew actively exploited CVEs:\n%s\n\nTotal in KEV catalog: %s\n\n🔗 https://www.cisa.gov/known-exploited-vulnerabilities-catalog' \
            "$DATE" "$NEW_ENTRIES" "$TOTAL")

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
          echo "MITRE/CISA brief sent"
