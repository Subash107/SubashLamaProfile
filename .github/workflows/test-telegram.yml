name: Test and Fix Telegram Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/test-telegram.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Register Telegram webhook via GitHub Actions
        run: |
          WORKER_URL="https://resume-tracker-bot.lamasubash107.workers.dev"
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          echo "=== Registering webhook ==="
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${WORKER_URL}\"}"
          echo ""
          echo "=== Webhook info ==="
          curl -s "https://api.telegram.org/bot${TOKEN}/getWebhookInfo"
