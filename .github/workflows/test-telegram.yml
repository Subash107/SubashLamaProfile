name: Test and Fix Telegram Bot

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check webhook status
        run: |
          echo "=== Webhook Info ==="
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo" | python3 -m json.tool

      - name: Register webhook
        run: |
          WORKER_URL="https://resume-tracker-bot.lamasubash107.workers.dev"
          echo "=== Registering webhook ==="
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook?url=${WORKER_URL}" | python3 -m json.tool

      - name: Send test message to bot
        run: |
          echo "=== Sending test message ==="
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"Bot test successful! Your resume tracker bot is working.\"}" | python3 -m json.tool
