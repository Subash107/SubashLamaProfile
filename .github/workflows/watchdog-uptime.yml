name: Watchdog — Portfolio Uptime

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check portfolio uptime
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          URL="https://subashlamaprofile.pages.dev"
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          STATE_FILE=".github/uptime-state.txt"
          PREV_STATE=$(cat "$STATE_FILE" 2>/dev/null || echo "up")

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "up" > "$STATE_FILE"
            if [ "$PREV_STATE" = "down" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${CHAT}\",\"text\":\"PORTFOLIO IS BACK ONLINE!\n\nURL: ${URL}\nStatus: HTTP ${STATUS}\nTime: ${TS}\"}"
            fi
            echo "Site is UP (HTTP $STATUS)"
          else
            if [ "$PREV_STATE" = "up" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${CHAT}\",\"text\":\"PORTFOLIO IS DOWN!\n\nURL: ${URL}\nStatus: HTTP ${STATUS}\nTime: ${TS}\n\nCheck immediately!\"}"
              echo "ALERT SENT — Site returned HTTP $STATUS"
            fi
            echo "down" > "$STATE_FILE"
          fi

          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add "$STATE_FILE" || true
          git diff --cached --quiet || git commit -m "chore: uptime state update" && git push || true
