name: Cert Renewal Countdown

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 7:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cert-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check cert expiry dates and send warnings
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"

          OUTPUT=$(CERT_FILE="download-logs/cert-expiry.json" python3 scripts/cert-check.py 2>/dev/null)
          echo "$OUTPUT"

          ALERTS_TEXT=$(echo "$OUTPUT" | grep "^ALERT=" | sed 's/^ALERT=//')
          SUMMARY_TEXT=$(echo "$OUTPUT" | grep "^SUMMARY=" | sed 's/^SUMMARY=//')
          ALERT_COUNT=$(echo "$OUTPUT" | grep -c "^ALERT=" || echo 0)

          if [ "${ALERT_COUNT:-0}" -gt 0 ]; then
            MSG=$(printf 'CERT RENEWAL ALERT!\n\n%s\n\nAll certifications:\n%s\n\nUpdate cert-expiry.json if dates are wrong.' \
              "$ALERTS_TEXT" "$SUMMARY_TEXT")
          else
            CERT_COUNT=$(echo "$OUTPUT" | grep -c "^SUMMARY=" || echo 0)
            MSG=$(printf 'Cert Status — All Good!\n\nAll %s certifications are valid.\n\nStatus:\n%s' \
              "$CERT_COUNT" "$SUMMARY_TEXT")
          fi

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
          echo "Cert countdown sent: $RESPONSE"
