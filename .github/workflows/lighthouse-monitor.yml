name: Lighthouse Performance Monitor

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday 9:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check PageSpeed score
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          URL="https://subashlamaprofile.pages.dev"

          RESULT=$(curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=mobile" 2>/dev/null)

          PERF=$(echo "$RESULT"  | python3 -c "import json,sys; d=json.load(sys.stdin); c=d.get('lighthouseResult',{}).get('categories',{}); print(int(c.get('performance',{}).get('score',0)*100))"  2>/dev/null || echo 0)
          ACCESS=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); c=d.get('lighthouseResult',{}).get('categories',{}); print(int(c.get('accessibility',{}).get('score',0)*100))" 2>/dev/null || echo 0)
          SEO=$(echo "$RESULT"   | python3 -c "import json,sys; d=json.load(sys.stdin); c=d.get('lighthouseResult',{}).get('categories',{}); print(int(c.get('seo',{}).get('score',0)*100))"          2>/dev/null || echo 0)
          BEST=$(echo "$RESULT"  | python3 -c "import json,sys; d=json.load(sys.stdin); c=d.get('lighthouseResult',{}).get('categories',{}); print(int(c.get('best-practices',{}).get('score',0)*100))" 2>/dev/null || echo 0)

          ALERT=""
          if [ "$PERF" -lt 70 ]; then ALERT="${ALERT}Performance is LOW (${PERF})\n"; fi
          if [ "$SEO" -lt 80 ]; then ALERT="${ALERT}SEO needs improvement (${SEO})\n"; fi

          DATE=$(date -u +"%Y-%m-%d")
          MSG=$(printf 'LIGHTHOUSE REPORT — %s\n\nPerformance   : %s/100\nAccessibility : %s/100\nBest Practices: %s/100\nSEO           : %s/100\n\n%sSite: %s' \
            "$DATE" "$PERF" "$ACCESS" "$BEST" "$SEO" "$ALERT" "$URL")

          if [ -z "$TOKEN" ] || [ -z "$CHAT" ]; then
            echo "ERROR: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret is missing."
            exit 1
          fi

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
          echo "Telegram response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import json,sys; r=json.load(sys.stdin); exit(0 if r.get('ok') else 1)" || {
            echo "ERROR: Telegram API rejected the message."
            exit 1
          }
