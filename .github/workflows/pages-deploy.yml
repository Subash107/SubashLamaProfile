name: Deploy static site to GitHub Pages

on:
  push:
    branches: [ "main" ]
  # Optional: allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Sync latest resume into public
        shell: pwsh
        run: ./scripts/sync-resume.ps1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify CSS
        run: |
          npx clean-css-cli@5 public/assets/css/index.css          -o public/assets/css/index.css
          npx clean-css-cli@5 public/assets/css/motion.css         -o public/assets/css/motion.css
          npx clean-css-cli@5 public/assets/css/projects.css       -o public/assets/css/projects.css
          npx clean-css-cli@5 public/assets/css/parrot-fx.css      -o public/assets/css/parrot-fx.css
          npx clean-css-cli@5 public/assets/css/record-producer.css -o public/assets/css/record-producer.css

      - name: Minify JS
        run: |
          npx terser public/assets/js/site.js      -o public/assets/js/site.js      --compress drop_console=true --mangle --comments false
          npx terser public/assets/js/index.js     -o public/assets/js/index.js     --compress drop_console=true --mangle --comments false
          npx terser public/assets/js/parrot-fx.js -o public/assets/js/parrot-fx.js --compress drop_console=true --mangle --comments false

      - name: Convert images to WebP
        run: |
          sudo apt-get install -y webp --quiet
          for img in public/assets/images/*.jpg public/assets/images/*.jpeg public/assets/images/*.png; do
            [ -f "$img" ] || continue
            base="${img%.*}"
            cwebp -q 82 "$img" -o "${base}.webp" -quiet
            echo "Converted: $img → ${base}.webp"
          done

      - name: Stamp service worker cache version with deploy date
        run: |
          DATE=$(date +%Y%m%d%H%M)
          sed -i "s/portfolio-[0-9]*/portfolio-${DATE}/" public/sw.js

      - name: Upload static files for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # If your built site lives in another folder (e.g. dist/ or public/),
          # change this path to that folder.
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
