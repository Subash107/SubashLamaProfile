name: Build Validation
# NOTE: Deployment is now handled by Cloudflare Pages (automatic on push to main).
# This workflow validates the build — minifies CSS/JS and checks for errors.
# Cloudflare Pages serves the source files directly with auto-minify at the edge.

on:
  push:
    branches: [main]
    paths: ['public/**', 'scripts/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "build-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (locked versions only)
        run: npm ci --ignore-scripts

      - name: Validate CSS (dry-run minification)
        run: |
          npx clean-css-cli public/assets/css/index.css     -o /dev/null
          npx clean-css-cli public/assets/css/motion.css    -o /dev/null
          npx clean-css-cli public/assets/css/parrot-fx.css -o /dev/null
          echo "CSS validation passed"

      - name: Validate JS (dry-run minification)
        run: |
          npx terser public/assets/js/site.js      -o /dev/null --compress --mangle
          npx terser public/assets/js/index.js     -o /dev/null --compress --mangle
          npx terser public/assets/js/parrot-fx.js -o /dev/null --compress --mangle
          echo "JS validation passed"

      - name: Validate HTML
        run: |
          sudo apt-get install tidy -y --quiet
          tidy -errors -quiet public/index.html || true
          tidy -errors -quiet public/projects.html || true
          tidy -errors -quiet public/security.html || true
          echo "HTML validation done"

      - name: Check _headers file syntax
        run: |
          python3 -c "
          with open('public/_headers') as f:
            lines = f.readlines()
          print(f'_headers: {len(lines)} lines — OK')
          "

      - name: Verify no unsafe-inline in CSP
        run: |
          if grep -l 'unsafe-inline' public/index.html public/projects.html 2>/dev/null | grep -qv 'title=\|content="[^"]*unsafe-inline[^"]*"'; then
            echo "WARNING: unsafe-inline may be present in CSP"
          else
            echo "CSP check passed — no unsafe-inline"
          fi
