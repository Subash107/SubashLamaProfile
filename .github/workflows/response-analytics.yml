name: Job Application Response Analytics

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analytics:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyse application response rates
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APPS_FILE="download-logs/job-applications.json"
          OUTCOMES_FILE="download-logs/interview-outcomes.json"

          [ ! -f "$APPS_FILE" ] && echo "No applications yet." && exit 0

          python3 -c "
import json, datetime, collections

with open('$APPS_FILE') as f:
    apps = json.load(f)

outcomes = []
try:
    with open('$OUTCOMES_FILE') as f:
        outcomes = json.load(f).get('entries', [])
except Exception:
    pass

today = datetime.date.today()
total = len(apps)
week_apps = [a for a in apps if a.get('date','') >= (today - datetime.timedelta(days=7)).isoformat()]
month_apps = [a for a in apps if a.get('date','') >= (today - datetime.timedelta(days=30)).isoformat()]

interviews = len([o for o in outcomes if 'Round' in o.get('stage','') or 'Screen' in o.get('stage','')])
offers = len([o for o in outcomes if o.get('stage') == 'Offer'])
rejected = len([o for o in outcomes if o.get('stage') == 'Rejected'])

rate = round(interviews / total * 100, 1) if total > 0 else 0

by_source = collections.Counter(a.get('source','Unknown') for a in apps)
top_source = by_source.most_common(3)
top_src_str = ', '.join(f'{s}: {c}' for s,c in top_source)

print(f'Total applications : {total}')
print(f'This week          : {len(week_apps)}')
print(f'This month         : {len(month_apps)}')
print(f'Interviews         : {interviews}')
print(f'Offers             : {offers}')
print(f'Rejected           : {rejected}')
print(f'Interview rate     : {rate}%')
print(f'Top sources        : {top_src_str}')
" > /tmp/analytics_out.txt 2>&1

          ANALYTICS=$(cat /tmp/analytics_out.txt)
          MSG=$(printf 'Weekly Job Search Analytics\n\nDate: %s\n\n%s\n\nTip: Aim for 10+ applications per week and track which source gives highest interview rate.' \
            "$(date -u +"%Y-%m-%d")" "$ANALYTICS")

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
