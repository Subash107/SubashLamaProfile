name: Job Application Response Analytics

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - run: echo "event=${{ github.event_name }}"
      - name: Checkout repository
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyse application response rates
        if: github.event_name != 'push'
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APPS_FILE="download-logs/job-applications.json"
          OUTCOMES_FILE="download-logs/interview-outcomes.json"

          [ ! -f "$APPS_FILE" ] && echo "No applications yet." && exit 0

          APPS_FILE="$APPS_FILE" OUTCOMES_FILE="$OUTCOMES_FILE" python3 scripts/response-analytics-summary.py > /tmp/analytics_out.txt 2>&1

          ANALYTICS=$(cat /tmp/analytics_out.txt)
          MSG=$(printf 'Weekly Job Search Analytics\n\nDate: %s\n\n%s\n\nTip: Aim for 10+ applications per week and track which source gives highest interview rate.' \
            "$(date -u +"%Y-%m-%d")" "$ANALYTICS")

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
