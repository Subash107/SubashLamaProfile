name: Remote Cybersecurity Job Monitor

on:
  schedule:
    - cron: '0 3 * * *'   # Daily 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  job-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch remote cybersecurity jobs
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"

          JOBS=$(python3 scripts/job-board-monitor.py 2>/dev/null || echo "NO_JOBS")

          if [ "$JOBS" = "NO_JOBS" ] || [ -z "$JOBS" ]; then
            echo "No matching jobs found today."
            exit 0
          fi

          MSG=$(printf 'REMOTE CYBERSECURITY JOBS TODAY\n\n%s\n\nApply now — these are remote opportunities matching your profile!' "$JOBS")

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
          echo "Job monitor sent: $RESPONSE"
