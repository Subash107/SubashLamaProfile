name: Remote Cybersecurity Job Monitor

on:
  schedule:
    - cron: '0 3 * * *'   # Daily 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  job-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch remote cybersecurity jobs
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"

          JOBS=$(python3 << 'PYEOF'
import urllib.request, xml.etree.ElementTree as ET, json

FEEDS = [
    ("Remotive", "https://remotive.com/remote-jobs/feed/cybersecurity"),
    ("Remotive SOC", "https://remotive.com/remote-jobs/feed/security"),
]

KEYWORDS = ["soc", "security analyst", "iam", "grc", "incident response",
            "threat hunt", "siem", "wazuh", "suricata", "compliance",
            "cybersecurity", "information security", "cloud security"]

results = []
for source, url in FEEDS:
    try:
        req = urllib.request.Request(url, headers={"User-Agent": "JobBot/1.0"})
        with urllib.request.urlopen(req, timeout=10) as r:
            tree = ET.fromstring(r.read())
        for item in tree.findall(".//item")[:10]:
            title = item.findtext("title", "").lower()
            link  = item.findtext("link", "")
            if any(k in title for k in KEYWORDS):
                results.append(item.findtext("title", "") + "\n   " + link)
    except Exception as e:
        pass

print("\n".join(results[:5]) if results else "NO_JOBS")
PYEOF
)

          if [ "$JOBS" = "NO_JOBS" ] || [ -z "$JOBS" ]; then
            echo "No matching jobs found today."
            exit 0
          fi

          MSG="REMOTE CYBERSECURITY JOBS TODAY

${JOBS}

Apply now — these are remote opportunities matching your profile!"

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
