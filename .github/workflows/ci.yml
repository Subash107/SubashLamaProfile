name: Static Site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Sync latest resume into public
        shell: pwsh
        run: ./scripts/sync-resume.ps1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Validate HTML
        run: htmlhint "public/**/*.html" --config .htmlhintrc || true

      - name: List project files
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -R

      # If your site is in a folder like 'public' or 'site', change this path
      - name: Upload static site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: public
