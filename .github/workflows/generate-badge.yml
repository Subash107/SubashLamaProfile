name: Generate Skills Badge

on:
  schedule:
    - cron: '30 2 * * *'   # Daily 8:15 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - run: echo "event=${{ github.event_name }}"
      - name: Checkout repository
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate badge SVG
        if: github.event_name != 'push'
        run: |
          LOG_DIR="download-logs"
          CERT_COUNT=4
          STUDY_LOG="${LOG_DIR}/study-log.json"
          CTF_LOG="${LOG_DIR}/ctf-log.json"
          VERSION_FILE="public/data/resume-version.json"

          STREAK=0
          if [ -f "$STUDY_LOG" ]; then
            STREAK=$(STUDY_LOG="$STUDY_LOG" python3 scripts/generate-badge-streak.py 2>/dev/null || echo 0)
          fi

          CTF_SCORE=0
          if [ -f "$CTF_LOG" ]; then
            CTF_SCORE=$(CTF_LOG="$CTF_LOG" python3 scripts/generate-badge-ctf.py 2>/dev/null || echo 0)
          fi

          VERSION="1.0.0"
          if [ -f "$VERSION_FILE" ]; then
            VERSION=$(python3 -c "import json; print(json.load(open('$VERSION_FILE')).get('version','1.0.0'))" 2>/dev/null || echo "1.0.0")
          fi

          CERT_COUNT="$CERT_COUNT" STREAK="$STREAK" CTF_SCORE="$CTF_SCORE" VERSION="$VERSION" python3 scripts/generate-badge-svg.py

      - name: Commit badge
        if: github.event_name != 'push'
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add public/assets/badge.svg
          git diff --staged --quiet && echo "Badge unchanged" && exit 0
          git commit -m "chore: regenerate skills badge $(date -u +"%Y-%m-%d")"
          git push
