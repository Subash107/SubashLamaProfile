name: Job Application Email Parser

on:
  schedule:
    - cron: '0 5 * * *'   # Daily 10:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - run: echo "event=${{ github.event_name }}"
      - name: Checkout repository
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse application confirmation emails via Gmail API
        if: github.event_name != 'push'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "GMAIL_APP_PASSWORD secret not set — skipping email parse."
            echo "To enable: add GMAIL_APP_PASSWORD to GitHub secrets (Google App Password)."
            exit 0
          fi

          python3 scripts/email-parser.py

      - name: Commit parsed applications
        if: github.event_name != 'push'
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add download-logs/job-applications.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "log: auto-parsed job applications from email $(date -u +"%Y-%m-%d")"
          git push
