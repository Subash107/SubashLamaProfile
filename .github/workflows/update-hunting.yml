name: Update Currently Hunting

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Focus type'
        required: true
        type: choice
        options:
          - ttp
          - tool
          - cert
          - lab
      title:
        description: 'Short title (e.g. T1059 — Command Interpreter)'
        required: true
      detail:
        description: 'What you are doing / learning'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Add hunting item to JSON
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          python3 -c "
import json, datetime
path = 'public/data/hunting.json'
try:
    with open(path) as f:
        data = json.load(f)
except Exception:
    data = {'updated': '', 'items': []}

new_item = {
    'type':   '${{ inputs.type }}',
    'title':  '${{ inputs.title }}',
    'detail': '${{ inputs.detail }}'
}

data['items'] = [i for i in data.get('items',[]) if i.get('type') != new_item['type'] or i.get('title') != new_item['title']]
data['items'].insert(0, new_item)
data['items'] = data['items'][:6]
data['updated'] = '$TODAY'

with open(path, 'w') as f:
    json.dump(data, f, indent=2)
print('Updated hunting.json with:', new_item['title'])
"

      - name: Commit update
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add public/data/hunting.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update currently hunting — ${{ inputs.title }}"
          git push

      - name: Telegram confirmation
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(printf 'Currently Hunting Updated!\n\nType   : %s\nTitle  : %s\nDetail : %s\n\nPortfolio will show this on next page load.' \
            "${{ inputs.type }}" "${{ inputs.title }}" "${{ inputs.detail }}")
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
