name: Generate Live Stats

on:
  schedule:
    - cron: '0 3 * * *'   # Daily at 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HTB_USERNAME: ${{ secrets.HTB_USERNAME }}
        run: python3 scripts/generate-stats.py

      - name: Commit stats.json
        run: |
          git config user.name  "Subash Lama"
          git config user.email "lamasubash107@gmail.com"
          git add public/stats.json
          if git diff --cached --quiet; then
            echo "No changes — stats.json already up to date"
          else
            git commit -m "chore: daily stats update $(date -u +%Y-%m-%d)"
            git push
          fi
