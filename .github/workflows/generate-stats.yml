name: Generate Live Stats

on:
  schedule:
    - cron: '0 3 * * *'   # Daily at 8:45 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HTB_USERNAME: ${{ secrets.HTB_USERNAME }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +"%Y-%m-%d")
          WEEK_AGO=$(date -u -d "7 days ago" +"%Y-%m-%d")
          TS=$(date -u +%s)

          # GitHub commits this week
          COMMITS=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/users/Subash107/events?per_page=100" | \
            python3 -c "
import json, sys
from datetime import datetime, timedelta, timezone
try:
    events = json.load(sys.stdin)
    cutoff = datetime.now(timezone.utc) - timedelta(days=7)
    c = sum(1 for e in events
            if isinstance(e, dict)
            and e.get('type') == 'PushEvent'
            and datetime.fromisoformat(
                e.get('created_at', '2000-01-01T00:00:00Z').replace('Z', '+00:00')
            ) > cutoff)
    print(c)
except Exception:
    print(0)
" 2>/dev/null || echo 0)

          # Resume downloads this week and total
          LOG="download-logs/resume-downloads.txt"
          WEEK_DL=0
          TOTAL_DL=0
          if [ -f "$LOG" ]; then
            TOTAL_DL=$(grep -c "^[0-9]" "$LOG" 2>/dev/null || echo 0)
            for i in $(seq 0 6); do
              DAY=$(date -u -d "-${i} days" +"%Y-%m-%d")
              C=$(grep -c "^${DAY}" "$LOG" 2>/dev/null || echo 0)
              WEEK_DL=$((WEEK_DL + C))
            done
          fi

          # HTB rank and points
          HTB_RANK="null"
          HTB_POINTS="null"
          HTB_RANK_TEXT="null"
          HTB_PROFILE="https://app.hackthebox.com"
          if [ -n "${HTB_USERNAME:-}" ]; then
            HTB_DATA=$(curl -s --max-time 10 \
              -H "User-Agent: StatsBot/1.0" \
              "https://www.hackthebox.com/api/v4/search/fetch?query=${HTB_USERNAME}&tags=users&page=1" 2>/dev/null || echo '{}')
            eval "$(echo "$HTB_DATA" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    users = d.get('users', [])
    if users:
        u = users[0]
        rank = str(u.get('rank', '')).replace('\"','')
        pts  = str(u.get('points', '')).replace('\"','')
        rtxt = str(u.get('rank_text', '')).replace('\"','')
        uid  = str(u.get('id', '0'))
        print(f'HTB_RANK=\"{rank}\"')
        print(f'HTB_POINTS=\"{pts}\"')
        print(f'HTB_RANK_TEXT=\"{rtxt}\"')
        print(f'HTB_PROFILE=\"https://app.hackthebox.com/users/{uid}\"')
except Exception:
    pass
" 2>/dev/null || true)"
          fi

          # Job applications this week
          APP_FILE="download-logs/job-applications.json"
          APPS_WEEK=0
          if [ -f "$APP_FILE" ]; then
            APPS_WEEK=$(python3 -c "
import json
try:
    with open('${APP_FILE}') as f:
        apps = json.load(f)
    count = sum(1 for a in apps if a.get('date', '') >= '${WEEK_AGO}')
    print(count)
except Exception:
    print(0)
" 2>/dev/null || echo 0)
          fi

          # Write stats.json (using python to ensure valid JSON)
          python3 - << PYEOF
import json
stats = {
    "generated": "${TODAY}",
    "generated_ts": ${TS},
    "github": {
        "commits_week": int("${COMMITS}"),
        "profile": "https://github.com/Subash107"
    },
    "resume": {
        "downloads_week": int("${WEEK_DL}"),
        "downloads_total": int("${TOTAL_DL}")
    },
    "htb": {
        "rank": ${HTB_RANK} if "${HTB_RANK}" == "null" else "${HTB_RANK}",
        "points": ${HTB_POINTS} if "${HTB_POINTS}" == "null" else "${HTB_POINTS}",
        "rank_text": None if "${HTB_RANK_TEXT}" == "null" else "${HTB_RANK_TEXT}",
        "profile": "${HTB_PROFILE}"
    },
    "jobs": {
        "applications_week": int("${APPS_WEEK}")
    },
    "certs": 7,
    "last_active": "${TODAY}"
}
with open("public/stats.json", "w") as f:
    json.dump(stats, f, indent=2)
print("stats.json written")
PYEOF

          echo "Generated:"
          cat public/stats.json

      - name: Commit stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stats.json
          if git diff --cached --quiet; then
            echo "No changes — stats.json already up to date"
          else
            git commit -m "chore: daily stats update $(date -u +%Y-%m-%d)"
            git push
          fi
