name: Lighthouse CI — Performance & Accessibility Audit

on:
  push:
    branches: [main]
    paths: ['public/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g http-server @lhci/cli

      - name: Start local server
        run: http-server public -p 8080 --silent &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Run Lighthouse — Desktop
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080/ \
            --collect.numberOfRuns=1 \
            --collect.settings.preset=desktop \
            --upload.target=temporary-public-storage \
            --assert.assertions.categories:performance=warn,0.7 \
            --assert.assertions.categories:accessibility=error,0.9 \
            --assert.assertions.categories:best-practices=warn,0.8 \
            --assert.assertions.categories:seo=warn,0.8
        continue-on-error: true

      - name: Run Lighthouse — Mobile
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080/ \
            --collect.numberOfRuns=1 \
            --collect.settings.emulatedFormFactor=mobile \
            --upload.target=temporary-public-storage \
            --assert.assertions.categories:performance=warn,0.6 \
            --assert.assertions.categories:accessibility=error,0.9
        continue-on-error: true

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
