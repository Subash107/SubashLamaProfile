name: Lighthouse CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync latest resume
        shell: pwsh
        run: ./scripts/sync-resume.ps1

      - name: Start local server
        run: npx serve public -p 8080 &

      - name: Wait for server
        run: sleep 5

      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@0.14.x autorun \
            --collect.url=http://localhost:8080 \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage || true
