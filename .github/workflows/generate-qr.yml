name: Generate QR Code

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  qr:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - run: echo "event=${{ github.event_name }}"
      - name: Checkout repository
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install qrcode library
        if: github.event_name != 'push'
        run: pip install qrcode[pil] 2>/dev/null || pip3 install qrcode 2>/dev/null || true

      - name: Generate QR code SVG
        if: github.event_name != 'push'
        run: |
          python3 scripts/generate-qr-svg.py

      - name: Commit QR code
        if: github.event_name != 'push'
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add public/assets/qr-code.svg
          git diff --staged --quiet && echo "QR unchanged" && exit 0
          git commit -m "chore: regenerate QR code for portfolio"
          git push
