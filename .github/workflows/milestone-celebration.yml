name: Milestone Celebration

on:
  schedule:
    - cron: '30 3 * * *'   # Daily 9:15 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  milestone:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check and celebrate milestones
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          LOG="download-logs/resume-downloads.txt"
          CACHE=".github/milestone-cache.txt"

          if [ ! -f "$LOG" ]; then exit 0; fi

          TOTAL=$(grep -c "^[0-9]" "$LOG" 2>/dev/null || echo 0)
          LAST_MILESTONE=$(cat "$CACHE" 2>/dev/null || echo "0")

          MILESTONES=(10 25 50 100 150 200 300 500)

          for M in "${MILESTONES[@]}"; do
            if [ "$TOTAL" -ge "$M" ] && [ "$LAST_MILESTONE" -lt "$M" ]; then
              # Top country
              TOP_COUNTRY=$(awk -F'|' '{print $3}' "$LOG" | awk -F',' '{print $NF}' | tr -d ' ' | sort | uniq -c | sort -rn | head -1 | awk '{print $2}')
              # Top company
              TOP_ORG=$(awk -F'|' '{print $4}' "$LOG" | tr -d ' ' | grep -v "^$" | sort | uniq -c | sort -rn | head -1 | awk '{print $2}')

              MSG=$(printf 'MILESTONE REACHED: %s DOWNLOADS!\n\nYour resume has been downloaded %s times!\n\nStats:\n  Top country : %s\n  Top company : %s\n  Total       : %s downloads\n\nThis is a real achievement. Recruiters around the world are reading your resume.\nKeep applying — your next job offer is coming!' \
                "$M" "$TOTAL" "$TOP_COUNTRY" "$TOP_ORG" "$TOTAL")

              curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${CHAT}\",\"text\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"

              echo "$M" > "$CACHE"
              git config user.email "lamasubash107@gmail.com"
              git config user.name "Subash Lama"
              git add "$CACHE"
              git commit -m "chore: update milestone cache to ${M}" || true
              git push || true
              break
            fi
          done

          if [ "$LAST_MILESTONE" = "0" ] && [ "$TOTAL" -lt "10" ]; then
            echo "$TOTAL" > "$CACHE"
          fi
