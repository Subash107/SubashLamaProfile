name: GitHub Stars and Forks Tracker

on:
  schedule:
    - cron: '30 4 * * *'   # Daily 10:15 AM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stars-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check stars and forks
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          USERNAME="Subash107"
          CACHE_FILE=".github/stars-cache.json"

          # Fetch all public repos
          REPOS=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/users/${USERNAME}/repos?per_page=50&sort=updated" | \
            python3 -c "
import json,sys
repos = json.load(sys.stdin)
result = {}
for r in repos:
    result[r['name']] = {'stars': r['stargazers_count'], 'forks': r['forks_count']}
print(json.dumps(result))
")

          # Load previous cache
          if [ -f "$CACHE_FILE" ]; then
            PREV=$(cat "$CACHE_FILE")
          else
            echo "$REPOS" > "$CACHE_FILE"
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            git add "$CACHE_FILE"
            git commit -m "chore: init stars cache" || true
            git push || true
            echo "First run — cache initialized."
            exit 0
          fi

          # Compare and find changes
          CHANGES=$(python3 -c "
import json
prev = json.loads('''${PREV}''')
curr = json.loads('''${REPOS}''')
msgs = []
for repo, data in curr.items():
    p = prev.get(repo, {'stars': 0, 'forks': 0})
    if data['stars'] > p['stars']:
        diff = data['stars'] - p['stars']
        msgs.append(f'+{diff} star(s) on {repo} (total: {data[\"stars\"]})')
    if data['forks'] > p['forks']:
        diff = data['forks'] - p['forks']
        msgs.append(f'+{diff} fork(s) on {repo} (total: {data[\"forks\"]})')
print('\n'.join(msgs))
")

          if [ -n "$CHANGES" ]; then
            MSG="GITHUB ACTIVITY ALERT!\n\n${CHANGES}\n\nProfile: https://github.com/${USERNAME}"
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
          else
            echo "No new stars or forks today."
          fi

          # Update cache
          echo "$REPOS" > "$CACHE_FILE"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add "$CACHE_FILE"
          git commit -m "chore: update stars cache" || true
          git push || true
