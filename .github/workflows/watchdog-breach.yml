name: Watchdog — Breach Monitor

on:
  schedule:
    - cron: '30 3 * * *'   # 9:15 AM Nepal Time daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  breach-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check email for data breaches
        run: |
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          EMAIL="lamasubash107@gmail.com"
          DATE=$(date -u +"%Y-%m-%d")

          RESULT=$(curl -s --max-time 10 \
            -H "User-Agent: BreachWatchdog/1.0" \
            "https://api.xposedornot.com/v1/check-email/${EMAIL}" 2>/dev/null || echo '{"Error":"failed"}')

          COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); b=d.get('breaches',[]); print(len(b) if isinstance(b,list) else len(b.keys()) if isinstance(b,dict) else 0)" 2>/dev/null || echo "0")
          SOURCES=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); b=d.get('breaches',[]); items=b if isinstance(b,list) else list(b.keys()); print(chr(10).join(items[:5]) if items else 'None')" 2>/dev/null || echo "Unknown")

          if [ "${COUNT:-0}" -gt "0" ] 2>/dev/null; then
            MSG=$(printf '🚨 BREACH ALERT!\n\nEmail: %s\nFound in: %s breach(es)\n\nSources:\n%s\n\nAction: Change passwords immediately!\nCheck: https://haveibeenpwned.com\nDate: %s' \
              "$EMAIL" "$COUNT" "$SOURCES" "$DATE")
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
            echo "Breach alert sent — found in $COUNT sources"
          else
            echo "No breaches found for $EMAIL on $DATE"
          fi
