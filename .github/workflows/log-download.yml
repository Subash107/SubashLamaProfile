name: Log Resume Download

on:
  repository_dispatch:
    types: [resume-download]

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Append download entry to log
        run: |
          mkdir -p download-logs

          TS="${{ github.event.client_payload.timestamp }}"
          IP="${{ github.event.client_payload.ip }}"
          LOC="${{ github.event.client_payload.location }}"
          ORG="${{ github.event.client_payload.org }}"
          OS="${{ github.event.client_payload.os }}"
          BROWSER="${{ github.event.client_payload.browser }}"
          DEVICE="${{ github.event.client_payload.device }}"
          TZ="${{ github.event.client_payload.tz }}"
          LANG="${{ github.event.client_payload.lang }}"
          REF="${{ github.event.client_payload.referrer }}"

          printf "%-26s| %-17s| %-31s| %-29s| %-13s| %-10s| %-9s| %s\n" \
            "$TS" "$IP" "$LOC" "$ORG" "$OS" "$BROWSER" "$DEVICE" "$REF" \
            >> download-logs/resume-downloads.txt

      - name: Commit and push log
        run: |
          git config user.email "lamasubash107@gmail.com"
          git config user.name "Subash Lama"
          git add download-logs/resume-downloads.txt
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "log: resume download [${{ github.event.client_payload.location }}] ${{ github.event.client_payload.timestamp }}"
          git push

      - name: Send Windows push notification (ntfy.sh)
        run: |
          LOC="${{ github.event.client_payload.location }}"
          ORG="${{ github.event.client_payload.org }}"
          OS="${{ github.event.client_payload.os }}"
          BROWSER="${{ github.event.client_payload.browser }}"
          DEVICE="${{ github.event.client_payload.device }}"
          TS="${{ github.event.client_payload.timestamp }}"
          LOG_URL="https://github.com/Subash107/SubashLamaProfile/blob/main/download-logs/resume-downloads.txt"
          MSG=$(printf 'Someone downloaded your resume!\n\nLocation : %s\nCompany  : %s\nDevice   : %s / %s / %s\nTime     : %s\n\nView log: %s' \
            "$LOC" "$ORG" "$DEVICE" "$OS" "$BROWSER" "$TS" "$LOG_URL")
          curl -s -X POST "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" \
            -H "Title: Resume Downloaded" \
            -H "Priority: high" \
            -H "Tags: page_facing_up,bell" \
            --data-raw "$MSG"

      - name: Send Telegram notification
        run: |
          LOC="${{ github.event.client_payload.location }}"
          ORG="${{ github.event.client_payload.org }}"
          OS="${{ github.event.client_payload.os }}"
          BROWSER="${{ github.event.client_payload.browser }}"
          DEVICE="${{ github.event.client_payload.device }}"
          TS="${{ github.event.client_payload.timestamp }}"
          IP="${{ github.event.client_payload.ip }}"
          REF="${{ github.event.client_payload.referrer }}"
          LEAD="${{ github.event.client_payload.lead_score }}"
          ANON="${{ github.event.client_payload.anon_flag }}"
          REPEAT="${{ github.event.client_payload.repeat }}"
          UTM_SOURCE="${{ github.event.client_payload.utm_source }}"
          UTM_MEDIUM="${{ github.event.client_payload.utm_medium }}"

          REPEAT_LINE=""
          if [ "$REPEAT" != "new" ] && [ -n "$REPEAT" ]; then
            REPEAT_LINE=$(printf '\n🔁 REPEAT VISITOR (last: %s)' "$REPEAT")
          fi

          ANON_LINE=""
          if [ "$ANON" != "none" ] && [ -n "$ANON" ]; then
            ANON_LINE=$(printf '\n%s' "$ANON")
          fi

          SOURCE_LINE=""
          if [ -n "$UTM_SOURCE" ] && [ "$UTM_SOURCE" != "direct" ] && [ "$UTM_SOURCE" != "none" ]; then
            SOURCE_LINE=$(printf '\n📌 Source    : %s (%s)' "$UTM_SOURCE" "$UTM_MEDIUM")
          fi

          MSG=$(printf '%s Resume Downloaded!%s%s%s\n\n📍 Location : %s\n🏢 Company  : %s\n💻 Device   : %s / %s / %s\n🌐 IP       : %s\n🔗 Referrer : %s\n🕐 Time     : %s\n\n📋 Log: https://github.com/Subash107/SubashLamaProfile/blob/main/download-logs/resume-downloads.txt' \
            "$LEAD" "$REPEAT_LINE" "$ANON_LINE" "$SOURCE_LINE" "$LOC" "$ORG" "$DEVICE" "$OS" "$BROWSER" "$IP" "$REF" "$TS")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"${MSG}\"}"

      - name: Send email notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: lamasubash107@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Resume Downloaded — ${{ github.event.client_payload.location }}"
          to: lamasubash107@gmail.com
          from: Portfolio Tracker <lamasubash107@gmail.com>
          body: |
            Someone just downloaded your resume!

            Time:      ${{ github.event.client_payload.timestamp }}
            IP:        ${{ github.event.client_payload.ip }}
            Location:  ${{ github.event.client_payload.location }}
            Company:   ${{ github.event.client_payload.org }}
            OS:        ${{ github.event.client_payload.os }}
            Browser:   ${{ github.event.client_payload.browser }}
            Device:    ${{ github.event.client_payload.device }}
            Referrer:  ${{ github.event.client_payload.referrer }}

            View full log: https://github.com/Subash107/SubashLamaProfile/blob/main/download-logs/resume-downloads.txt
