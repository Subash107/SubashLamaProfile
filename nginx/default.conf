server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  location /assets/ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
