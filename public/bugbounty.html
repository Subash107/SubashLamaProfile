<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bug Bounty Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111c;--bg2:#0c1825;--bg3:#112233;--bg4:#0a1520;
  --b:rgba(255,255,255,0.07);--bh:rgba(255,184,108,0.35);
  --t:#e0e8f0;--td:rgba(255,255,255,0.55);--tm:rgba(255,255,255,0.28);
  --cy:#8ae8ff;--gr:#50fa7b;--or:#ffb86c;--re:#ff5555;--pu:#bd93f9;--ye:#f1fa8c;--pk:#ff79c6;
  --p1:#ff5555;--p2:#ffb86c;--p3:#f1fa8c;--p4:#50fa7b;
  --sw:235px;--hh:52px;--r:10px;--rs:6px
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;font-size:14px;line-height:1.6}

/* SIDEBAR */
#sb{width:var(--sw);min-height:100vh;background:rgba(0,0,0,0.4);border-right:1px solid var(--b);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sb-brand{padding:1rem 1rem 0.85rem;border-bottom:1px solid var(--b)}
.sb-logo{font-size:1.1rem;margin-bottom:0.15rem}
.sb-t{font-size:0.78rem;font-weight:900;color:var(--or);letter-spacing:0.04em;text-transform:uppercase}
.sb-s{font-size:0.61rem;color:var(--tm);margin-top:0.05rem}
.sb-nav{flex:1;padding:0.55rem 0;overflow-y:auto}
.sb-lbl{font-size:0.57rem;font-weight:800;color:var(--tm);text-transform:uppercase;letter-spacing:0.1em;padding:0.6rem 1rem 0.18rem}
.sb-a{display:flex;align-items:center;gap:0.5rem;padding:0.48rem 1rem;color:var(--td);font-size:0.79rem;font-weight:500;border-left:2px solid transparent;cursor:pointer;transition:all 0.13s;user-select:none}
.sb-a:hover{color:var(--t);background:var(--bg3)}
.sb-a.on{color:var(--or);border-left-color:var(--or);background:rgba(255,184,108,0.07)}
.sb-a-i{width:14px;text-align:center;font-size:0.82rem}
.sb-foot{padding:0.65rem 1rem;border-top:1px solid var(--b);font-size:0.67rem}
.sf-row{display:flex;justify-content:space-between;margin-bottom:0.22rem}
.sf-l{color:var(--tm)}
.sf-v{font-family:monospace;font-weight:700}

/* MAIN */
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
#hdr{height:var(--hh);background:rgba(0,0,0,0.28);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
#hdr-t{font-size:0.92rem;font-weight:700}
.hdr-acts{display:flex;gap:0.45rem}
#cnt{padding:1.3rem 1.4rem;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:0.32rem;padding:0.4rem 0.8rem;border-radius:var(--rs);font-size:0.75rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.13s;font-family:inherit;white-space:nowrap}
.bo{background:rgba(255,184,108,0.1);border-color:rgba(255,184,108,0.32);color:var(--or)}
.bo:hover{background:rgba(255,184,108,0.18);border-color:var(--or)}
.bp{background:rgba(138,232,255,0.09);border-color:rgba(138,232,255,0.3);color:var(--cy)}
.bp:hover{background:rgba(138,232,255,0.17);border-color:var(--cy)}
.bg2{background:transparent;border-color:var(--b);color:var(--td)}
.bg2:hover{border-color:rgba(255,255,255,0.2);color:var(--t)}
.bd{background:rgba(255,85,85,0.08);border-color:rgba(255,85,85,0.26);color:var(--re)}
.bd:hover{background:rgba(255,85,85,0.15)}
.bs{background:rgba(80,250,123,0.08);border-color:rgba(80,250,123,0.26);color:var(--gr)}
.bs:hover{background:rgba(80,250,123,0.15)}
.btn-sm{padding:0.26rem 0.58rem;font-size:0.69rem}
.btn-i{padding:0.28rem 0.38rem}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:1rem;transition:border-color 0.17s}
.card:hover{border-color:var(--bh)}
.c-lbl{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--tm);margin-bottom:0.35rem}
.c-val{font-size:1.85rem;font-weight:900;font-family:monospace;line-height:1}
.c-sub{font-size:0.65rem;color:var(--tm);margin-top:0.28rem}

/* GRIDS */
.stat-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.7rem;margin-bottom:1.3rem}
.two-c{display:grid;grid-template-columns:1fr 1fr;gap:0.95rem}
.three-c{display:grid;grid-template-columns:repeat(3,1fr);gap:0.95rem}

/* SECTION HDR */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;flex-wrap:wrap;gap:0.35rem}
.sh-t{font-size:0.83rem;font-weight:700}

/* FILTER BAR */
.fb{display:flex;gap:0.5rem;margin-bottom:0.8rem;flex-wrap:wrap}
input,select,textarea{background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:var(--rs);color:var(--t);padding:0.4rem 0.65rem;font-size:0.76rem;font-family:inherit;outline:none;transition:border-color 0.13s;width:100%}
input:focus,select:focus,textarea:focus{border-color:rgba(255,184,108,0.45)}
select option{background:#0c1825}
textarea{resize:vertical;min-height:70px}
.si{min-width:185px;width:auto}
.fs{width:auto}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.77rem}
thead th{text-align:left;padding:0.5rem 0.65rem;font-size:0.61rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--tm);border-bottom:1px solid var(--b);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.1s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:0.6rem 0.65rem;vertical-align:middle}
tbody tr:last-child{border:none}

/* BADGES */
.b{display:inline-flex;align-items:center;padding:0.14rem 0.48rem;border-radius:4px;font-size:0.61rem;font-weight:700;white-space:nowrap}
.bP1{background:rgba(255,85,85,0.16);color:var(--p1);border:1px solid rgba(255,85,85,0.3)}
.bP2{background:rgba(255,184,108,0.14);color:var(--p2);border:1px solid rgba(255,184,108,0.3)}
.bP3{background:rgba(241,250,140,0.1);color:var(--p3);border:1px solid rgba(241,250,140,0.22)}
.bP4{background:rgba(80,250,123,0.1);color:var(--p4);border:1px solid rgba(80,250,123,0.22)}
.b-draft{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1)}
.b-sub{background:rgba(138,232,255,0.1);color:var(--cy);border:1px solid rgba(138,232,255,0.25)}
.b-tri{background:rgba(255,184,108,0.12);color:var(--or);border:1px solid rgba(255,184,108,0.28)}
.b-res{background:rgba(80,250,123,0.1);color:var(--gr);border:1px solid rgba(80,250,123,0.25)}
.b-dup{background:rgba(189,147,249,0.1);color:var(--pu);border:1px solid rgba(189,147,249,0.22)}
.b-na{background:rgba(255,255,255,0.05);color:var(--tm);border:1px solid rgba(255,255,255,0.09)}
.b-paid{background:rgba(80,250,123,0.18);color:#00ff88;border:1px solid rgba(80,250,123,0.4)}
.b-act{background:rgba(80,250,123,0.1);color:var(--gr);border:1px solid rgba(80,250,123,0.22)}
.b-pau{background:rgba(255,184,108,0.1);color:var(--or);border:1px solid rgba(255,184,108,0.22)}
.b-end{background:rgba(255,85,85,0.08);color:var(--re);border:1px solid rgba(255,85,85,0.2)}
.b-h1{background:rgba(255,79,79,0.1);color:#ff4f4f;border:1px solid rgba(255,79,79,0.25)}
.b-bc{background:rgba(0,114,255,0.1);color:#3d9bff;border:1px solid rgba(0,114,255,0.25)}
.b-in{background:rgba(255,79,122,0.1);color:#ff4f7a;border:1px solid rgba(255,79,122,0.25)}
.b-gen{background:rgba(138,232,255,0.08);color:var(--cy);border:1px solid rgba(138,232,255,0.2)}

/* SCOPE TAGS */
.scope-in{background:rgba(80,250,123,0.08);border:1px solid rgba(80,250,123,0.2);color:var(--gr);padding:0.12rem 0.4rem;border-radius:3px;font-size:0.6rem;font-family:monospace;margin:0.1rem;display:inline-block}
.scope-out{background:rgba(255,85,85,0.08);border:1px solid rgba(255,85,85,0.2);color:var(--re);padding:0.12rem 0.4rem;border-radius:3px;font-size:0.6rem;font-family:monospace;margin:0.1rem;display:inline-block}
.tag{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--td);padding:0.1rem 0.38rem;border-radius:3px;font-size:0.6rem;margin:0.1rem;display:inline-block;cursor:pointer}
.tag:hover{border-color:rgba(255,184,108,0.3);color:var(--or)}

/* MODAL */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#mo.open{display:flex}
#mb{background:#0c1825;border:1px solid var(--bh);border-radius:var(--r);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding:1.3rem;position:relative}
#mb.wide{max-width:860px}
.m-t{font-size:0.92rem;font-weight:700;color:var(--or);margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:1px solid var(--b)}
.m-x{position:absolute;top:0.85rem;right:0.85rem;background:none;border:none;color:var(--td);font-size:1.05rem;cursor:pointer;padding:0.18rem 0.32rem;border-radius:4px}
.m-x:hover{color:var(--t);background:rgba(255,255,255,0.07)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
.fgf{grid-column:1/-1}
.fl{font-size:0.63rem;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:0.22rem}
.fa{display:flex;justify-content:flex-end;gap:0.45rem;margin-top:1rem;padding-top:0.6rem;border-top:1px solid var(--b)}

/* CVSS CALCULATOR */
.cvss-wrap{background:rgba(0,0,0,0.25);border:1px solid rgba(255,184,108,0.18);border-radius:8px;padding:0.9rem;margin-top:0.85rem}
.cvss-title{font-size:0.68rem;font-weight:800;color:var(--or);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.65rem}
.cvss-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:0.65rem}
.cvss-group label{font-size:0.59rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:0.18rem}
.cvss-score-bar{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 0.9rem;background:rgba(0,0,0,0.3);border-radius:6px;border:1px solid var(--b)}
.cvss-score-num{font-size:2rem;font-weight:900;font-family:monospace;min-width:52px}
.cvss-score-info{flex:1}
.cvss-score-rating{font-size:0.8rem;font-weight:700;margin-bottom:0.1rem}
.cvss-vector{font-size:0.6rem;font-family:monospace;color:var(--tm);word-break:break-all;margin-top:0.15rem}
.cvss-p{font-size:0.7rem;font-weight:800;padding:0.1rem 0.45rem;border-radius:4px;border:1px solid currentColor}

/* REPORT */
.report-area{background:rgba(0,0,0,0.3);border:1px solid var(--b);border-radius:8px;padding:1rem;font-family:monospace;font-size:0.73rem;color:var(--td);white-space:pre-wrap;max-height:420px;overflow-y:auto;line-height:1.65}
.report-actions{display:flex;gap:0.5rem;margin-top:0.75rem}

/* RECON */
.recon-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:1rem;margin-bottom:0.65rem;transition:border-color 0.17s}
.recon-card:hover{border-color:var(--bh)}
.recon-prog{font-size:0.68rem;font-weight:700;color:var(--or);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
.recon-section{margin-bottom:0.55rem}
.recon-section-t{font-size:0.62rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.2rem}
.recon-item{font-size:0.72rem;color:var(--t);font-family:monospace;background:rgba(255,255,255,0.03);border-radius:4px;padding:0.15rem 0.4rem;margin:0.1rem;display:inline-block;border:1px solid rgba(255,255,255,0.06)}

/* LEARN */
.learn-row{display:flex;align-items:center;gap:0.65rem;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.learn-tech{font-weight:600;min-width:160px;font-size:0.78rem}
.learn-src{font-size:0.65rem;color:var(--tm);min-width:100px}
.learn-tags{flex:1;display:flex;flex-wrap:wrap;gap:0.2rem}
.learn-date{font-family:monospace;font-size:0.65rem;color:var(--tm);white-space:nowrap}

/* SCOPE WARNING */
.scope-warn{background:rgba(255,85,85,0.08);border:1px solid rgba(255,85,85,0.25);border-radius:6px;padding:0.45rem 0.65rem;font-size:0.7rem;color:var(--re);margin-top:0.35rem;display:none}
.scope-ok{background:rgba(80,250,123,0.07);border:1px solid rgba(80,250,123,0.22);border-radius:6px;padding:0.45rem 0.65rem;font-size:0.7rem;color:var(--gr);margin-top:0.35rem;display:none}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--b);margin-bottom:1rem}
.tab{padding:0.5rem 1rem;font-size:0.76rem;font-weight:600;color:var(--td);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.13s}
.tab:hover{color:var(--t)}
.tab.on{color:var(--or);border-bottom-color:var(--or)}

/* TOAST */
#toast{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--bg2);border:1px solid var(--gr);border-radius:var(--rs);padding:0.55rem 0.85rem;font-size:0.74rem;color:var(--gr);z-index:999;transform:translateY(70px);opacity:0;transition:all 0.2s;pointer-events:none}
#toast.on{transform:translateY(0);opacity:1}

/* EMPTY */
.empty{text-align:center;padding:2.2rem 1rem;color:var(--tm)}
.empty-i{font-size:1.9rem;margin-bottom:0.55rem;opacity:0.3}

/* MISC */
.mono{font-family:monospace}
.dim{color:var(--tm)}
.mt1{margin-top:0.5rem}.mt2{margin-top:1rem}
.divider{border:none;border-top:1px solid var(--b);margin:0.85rem 0}
.pill{display:inline-flex;padding:0.12rem 0.45rem;border-radius:999px;font-size:0.6rem;font-weight:700;white-space:nowrap}

@media(max-width:900px){#sb{transform:translateX(-100%)}#sb.open{transform:translateX(0)}#main{margin-left:0}.two-c,.three-c{grid-template-columns:1fr}.fg{grid-template-columns:1fr}.cvss-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){#cnt{padding:0.9rem}.stat-g{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px}
</style>
</head>
<body>

<nav id="sb">
  <div class="sb-brand">
    <div class="sb-logo">🎯</div>
    <div class="sb-t">Bug Bounty Tracker</div>
    <div class="sb-s">HackerOne · Intigriti · Bugcrowd</div>
  </div>
  <div class="sb-nav">
    <div class="sb-lbl">Overview</div>

    <div class="sb-a" data-p="programs"><span class="sb-a-i">◈</span>Program Manager</div>

    <div class="sb-lbl">Tools</div>
    <div class="sb-a" data-p="report"><span class="sb-a-i">📄</span>Report Builder</div>
    <div class="sb-a" data-p="recon"><span class="sb-a-i">🔍</span>Recon Notes</div>
    <div class="sb-lbl">Growth</div>
    <div class="sb-a" data-p="learn"><span class="sb-a-i">📚</span>Learning Tracker</div>

  <div class="sb-foot" id="sb-foot"></div>
</nav>

<div id="main">
  <header id="hdr">
    <div id="hdr-t">Dashboard</div>
    <div class="hdr-acts">
      <button class="btn bo btn-sm" onclick="openFindM()">+ Quick Finding</button>

      <input type="file" id="imp-file" accept=".json" style="display:none">
    </div>
  </header>
  <main id="cnt"></main>
</div>

<div id="mo"><div id="mb">
  <button class="m-x" id="m-close">✕</button>
  <div class="m-t" id="m-title"></div>
  <div id="m-body"></div>
</div></div>
<div id="toast"></div>

    {id:'f1',programId:'pg1',title:'Stored XSS in user profile bio field',type:'XSS',endpoint:'https://app.acmecorp.com/profile/edit',severity:'P2 - High',cvss:'8.1',cvssVector:'CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:H/I:L/A:N',status:'Triaged',poc:'<script>alert(document.cookie)<\/script>',steps:'1. Go to profile edit\n2. Enter XSS payload in bio\n3. Save and view another user\'s profile',impact:'Attacker can steal session cookies of any user who views the affected profile.',suggestedFix:'Implement HTML encoding on output. Use DOMPurify for sanitisation.',submittedDate:'2026-05-10',responseDate:'2026-05-12',resolvedDate:'',bountyAmount:'',notes:'Triage confirmed. Waiting for fix.'},

/* ═══════════════════════════════════════════════════════
   CVSS 3.1 CALCULATOR
═══════════════════════════════════════════════════════ */
function calcCVSS(av,ac,pr,ui,s,c,i,a){
  const AV={N:0.85,A:0.62,L:0.55,P:0.2};
  const AC={L:0.77,H:0.44};
  const PRu={N:0.85,L:0.62,H:0.27};
  const PRc={N:0.85,L:0.68,H:0.5};
  const UI={N:0.85,R:0.62};
  const CIA={N:0,L:0.22,H:0.56};
  const prVal=s==='C'?PRc[pr]:PRu[pr];
  const expl=8.22*AV[av]*AC[ac]*prVal*UI[ui];
  const iscBase=1-(1-CIA[c])*(1-CIA[i])*(1-CIA[a]);
  let imp=0;
  if(s==='U') imp=6.42*iscBase;
  else imp=7.52*(iscBase-0.029)-3.25*Math.pow(iscBase-0.02,15);
  if(imp<=0)return{score:0,rating:'None',color:'var(--tm)',p:'N/A'};
  let raw=s==='U'?Math.min(10,imp+expl):Math.min(10,1.08*(imp+expl));
  const score=Math.ceil(raw*10)/10;
  let rating,color,p;
  if(score===0){rating='None';color='var(--tm)';p='N/A';}
  else if(score<4){rating='Low';color='var(--p4)';p='P4';}
  else if(score<7){rating='Medium';color='var(--p3)';p='P3';}
  else if(score<9){rating='High';color='var(--p2)';p='P2';}
  else{rating='Critical';color='var(--p1)';p='P1';}
  return{score,rating,color,p};
}

function cvssVector(av,ac,pr,ui,s,c,i,a){
  return `CVSS:3.1/AV:${av}/AC:${ac}/PR:${pr}/UI:${ui}/S:${s}/C:${c}/I:${i}/A:${a}`;
}

function updateCVSS(){
  const av=gv('cv-av'),ac=gv('cv-ac'),pr=gv('cv-pr'),ui=gv('cv-ui');
  const s=gv('cv-s'),c=gv('cv-c'),i=gv('cv-i'),a=gv('cv-a');
  if(!av)return;
  const r=calcCVSS(av,ac,pr,ui,s,c,i,a);
  const sn=document.getElementById('cv-score-num');
  const sr=document.getElementById('cv-score-rating');
  const sv=document.getElementById('cv-score-vector');
  const sp=document.getElementById('cv-score-p');
  if(sn)sn.textContent=r.score.toFixed(1);
  if(sn)sn.style.color=r.color;
  if(sr){sr.textContent=r.rating;sr.style.color=r.color;}
  if(sv)sv.textContent=cvssVector(av,ac,pr,ui,s,c,i,a);
  if(sp){sp.textContent=r.p;sp.style.color=r.color;sp.style.borderColor=r.color;}
  // copy values to main form if present
  const fcvss=document.getElementById('f-cvss');
  const fvec=document.getElementById('f-cvss-vector');
  const fsev=document.getElementById('f-sev');
  if(fcvss)fcvss.value=r.score.toFixed(1);
  if(fvec)fvec.value=cvssVector(av,ac,pr,ui,s,c,i,a);
  if(fsev&&r.p!=='N/A'){
    const map={'P1':'P1 - Critical','P2':'P2 - High','P3':'P3 - Medium','P4':'P4 - Low'};
    const opt=map[r.p];
    if(opt)fsev.value=opt;
  }
}

function cvssHTML(vals){
  const d=vals||{av:'N',ac:'L',pr:'N',ui:'N',s:'U',c:'N',i:'N',a:'N'};
  const sel=(id,name,opts,cur)=>`<div class="cvss-group"><label>${name}</label><select id="${id}" onchange="updateCVSS()">${opts.map(([v,l])=>`<option value="${v}"${cur===v?' selected':''}>${l}</option>`).join('')}</select></div>`;

    </div>
    <div class="cvss-score-bar">
      <div class="cvss-score-num" id="cv-score-num">0.0</div>
      <div class="cvss-score-info">
        <div style="display:flex;align-items:center;gap:0.5rem">

    (!q||f.title.toLowerCase().includes(q)||f.type.toLowerCase().includes(q))&&
    (!pr||f.programId===pr)&&(!sv||f.severity===sv)&&(!st||f.status===st)&&(!ty||f.type===ty)

      <div class="fgf"><label class="fl">Impact</label><textarea id="f-impact">${f?.impact||''}</textarea></div>

      responseDate:gv('f-rd'),resolvedDate:gv('f-resdate'),
      steps:gv('f-steps'),impact:gv('f-impact'),poc:gv('f-poc'),suggestedFix:gv('f-fix'),notes:gv('f-nt')};
    if(!o.title){toast('Title required','var(--re)');return;}
    if(f){S.findings[S.findings.findIndex(x=>x.id===id)]=o;}else{S.findings.unshift(o);}
    save();closeM();if(page==='findings')rFind();else rDash();toast(f?'Updated':'Finding logged');

function checkScope(){
  const ep=gv('f-ep');
  const progId=gv('f-prog');
  const prog=S.programs.find(p=>p.id===progId);
  const fb=document.getElementById('scope-feedback');
  if(!fb||!ep||!prog)return;
  const inS=prog.inScope||[];
  const outS=prog.outScope||[];
  const isOut=outS.some(s=>ep.includes(s));
  if(isOut){fb.className='scope-warn';fb.style.display='block';fb.textContent='⚠ This endpoint matches the OUT-OF-SCOPE list. Do not test!';return;}
  const isIn=inS.some(s=>{const url=s.url.replace('*.','.').replace('*.','');return ep.includes(url.replace(/^\*/,''));});
  if(isIn){fb.className='scope-ok';fb.style.display='block';fb.textContent='✓ Endpoint is in scope.';}
  else{fb.className='scope-warn';fb.style.display='block';fb.textContent='⚠ Endpoint not found in scope list. Verify before testing.';}
}

function buildReport(title,type,sev,ep,steps,impact,poc,fix,cvss,vector,prog){
  const date=new Date().toISOString().slice(0,10);
  return `# Bug Report: ${title||'[Title]'}

**Date:** ${date}
**Program:** ${prog||'[Program]'}
**Severity:** ${sev||'[Severity]'}  |  **CVSS 3.1:** ${cvss||'[Score]'}
**CVSS Vector:** \`${vector||'[Vector]'}\`
**Vulnerability Type:** ${type||'[Type]'}
**Affected Endpoint:** \`${ep||'[Endpoint]'}\`

---

## Summary

${title||'[Brief description of the vulnerability]'}

---

## Steps to Reproduce

${steps?steps.split('\n').filter(Boolean).map((l,i)=>/^\d+\./.test(l.trim())?l.trim():`${i+1}. ${l.trim()}`).join('\n'):'1. [Step 1]\n2. [Step 2]\n3. [Step 3]'}

---

## Proof of Concept

\`\`\`
${poc||'[PoC payload, screenshot reference, or code]'}
\`\`\`

---

## Impact

${impact||'[Describe the security impact and affected users/data]'}

---

## Suggested Remediation

${fix||'[Specific remediation steps]'}

---

## Severity Justification

**CVSS 3.1 Base Score: ${cvss||'N/A'} (${sev||'N/A'})**

\`${vector||'[CVSS Vector]'}\`

---

*Report generated by Bug Bounty Tracker*`;
}

function genReport(){
  const id=gv('rep-find');
  const f=S.findings.find(x=>x.id===id);
  if(!f){document.getElementById('report-out').textContent='Select a finding to generate a report…';return;}
  const prog=progName(f.programId);
  document.getElementById('report-out').textContent=buildReport(f.title,f.type,f.severity,f.endpoint,f.steps,f.impact,f.poc,f.suggestedFix,f.cvss,f.cvssVector,prog);
}
function genManualReport(){
  const cv=gv('f-cvss')||gv('cv-score-num');
  const vec=gv('f-cvss-vector')||gv('cv-score-vector');
  document.getElementById('report-out').textContent=buildReport(gv('rt-title'),gv('rt-type'),gv('rt-sev'),gv('rt-ep'),gv('rt-steps'),gv('rt-impact'),gv('rt-poc'),gv('rt-fix'),cv,vec,'[Program]');
}
function copyReport(){
  const t=document.getElementById('report-out').textContent;
  navigator.clipboard?.writeText(t).then(()=>toast('Copied to clipboard!')).catch(()=>fallbackCopy(t));
}
function copyPlainText(){
  const t=document.getElementById('report-out').textContent.replace(/#{1,3} /g,'').replace(/\*\*/g,'').replace(/`/g,'');
  navigator.clipboard?.writeText(t).then(()=>toast('Plain text copied!')).catch(()=>fallbackCopy(t));
}
function dlReport(){
  const t=document.getElementById('report-out').textContent;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([t],{type:'text/markdown'}));
  a.download=`bug-report-${Date.now()}.md`;a.click();toast('Downloaded!');
}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied!');}

function openReportPreview(id){
  const f=S.findings.find(x=>x.id===id);if(!f)return;

  const md=buildReport(f.title,f.type,f.severity,f.endpoint,f.steps,f.impact,f.poc,f.suggestedFix,f.cvss,f.cvssVector,prog);

      <div class="fgf"><label class="fl">Interesting Parameters (comma-separated)</label><input type="text" id="f-par" value="${(r?.parameters||[]).join(', ')}" placeholder="user_id, redirect_url, file…"></div>
      <div class="fgf"><label class="fl">JS Files Reviewed (one per line)</label><textarea id="f-js" style="font-family:monospace;font-size:0.7rem">${(r?.jsFiles||[]).join('\n')}</textarea></div>
      <div class="fgf"><label class="fl">Tags (comma-separated)</label><input type="text" id="f-tags" value="${(r?.tags||[]).join(', ')}" placeholder="graphql, admin-panel, api-v2…"></div>
      <div class="fgf"><label class="fl">Notes</label><textarea id="f-nt" style="min-height:100px">${r?.notes||''}</textarea></div>
    </div>
    <div class="fa"><button class="btn bg2" onclick="closeM()">Cancel</button><button class="btn bo" id="m-save">Save</button></div>`);
  document.getElementById('m-save').onclick=()=>{
    const o={id:r?.id||uid(),programId:gv('f-prog'),
      techStack:gv('f-ts').split(',').map(x=>x.trim()).filter(Boolean),
      endpoints:gv('f-ep').split('\n').map(x=>x.trim()).filter(Boolean),
      parameters:gv('f-par').split(',').map(x=>x.trim()).filter(Boolean),
      jsFiles:gv('f-js').split('\n').map(x=>x.trim()).filter(Boolean),
      tags:gv('f-tags').split(',').map(x=>x.trim()).filter(Boolean),
      notes:gv('f-nt'),date:new Date().toISOString().slice(0,10)};
    if(!o.programId){toast('Select a program','var(--re)');return;}
    if(r){S.recon[S.recon.findIndex(x=>x.id===id)]=o;}else{S.recon.unshift(o);}
    save();closeM();rRecon();toast(r?'Updated':'Recon note saved');
  };
}

/* ═══════════════════════════════════════════════════════
   LEARNING TRACKER
═══════════════════════════════════════════════════════ */
function rLearn(){
  const c=document.getElementById('cnt');
  c.innerHTML=`
    <div class="fb">
      <input type="search" class="si" id="lq" placeholder="Search techniques…" oninput="rLearnRows()">
      <select class="fs" id="lsrc" onchange="rLearnRows()">${['<option value="">All Sources</option>',...SOURCES.map(x=>`<option>${x}</option>`)].join('')}</select>
      <select class="fs" id="llab" onchange="rLearnRows()">
        <option value="">All</option><option value="yes">Lab Completed</option><option value="no">Lab Pending</option>
      </select>
      <button class="btn bo" onclick="openLearnM()">+ Add Entry</button>
    </div>

    <div class="stat-g" style="grid-template-columns:repeat(4,1fr);margin-bottom:1rem">
      <div class="card"><div class="c-lbl">Techniques</div><div class="c-val" style="color:var(--or)">${S.learning.length}</div><div class="c-sub">Studied</div></div>
      <div class="card"><div class="c-lbl">Labs Done</div><div class="c-val" style="color:var(--gr)">${S.learning.filter(l=>l.labCompleted).length}</div><div class="c-sub">of ${S.learning.length}</div></div>
      <div class="card"><div class="c-lbl">Applied</div><div class="c-val" style="color:var(--cy)">${S.learning.filter(l=>l.appliedIn?.length).length}</div><div class="c-sub">In real findings</div></div>
      <div class="card"><div class="c-lbl">This Month</div><div class="c-val" style="color:var(--or)">${S.learning.filter(l=>l.date>=new Date().toISOString().slice(0,7)).length}</div><div class="c-sub">Entries</div></div>
    </div>

    <div class="card" style="padding:0"><div class="tw"><table>
      <thead><tr><th>Technique</th><th>Source</th><th>Date</th><th>Lab</th><th>Applied In</th><th>Writeup</th><th></th></tr></thead>
      <tbody id="l-tbody"></tbody>
    </table></div></div>`;
  rLearnRows();
}
function rLearnRows(){
  const q=gv('lq').toLowerCase(),src=gv('lsrc'),lab=gv('llab');
  const rows=S.learning.filter(l=>
    (!q||l.technique.toLowerCase().includes(q)||l.notes.toLowerCase().includes(q))&&
    (!src||l.source===src)&&
    (!lab||(lab==='yes'?l.labCompleted:!l.labCompleted))
  ).sort((a,b)=>b.date.localeCompare(a.date));
  const tb=document.getElementById('l-tbody');
  if(!tb)return;
  if(!rows.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty"><div class="empty-i">📚</div><p>No entries</p></div></td></tr>`;return;}
  tb.innerHTML=rows.map(l=>{
    const applied=l.appliedIn?.map(fid=>{const f=S.findings.find(x=>x.id===fid);return f?`<span class="b b-sub" style="font-size:0.58rem;cursor:pointer" onclick="openFindM('${fid}')">${f.type}</span>`:null;}).filter(Boolean).join(' ')||'—';
    return `<tr>
      <td><div style="font-weight:600;font-size:0.78rem">${l.technique}</div>${l.notes?`<div style="font-size:0.63rem;color:var(--tm);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.notes}</div>`:''}</td>
      <td style="font-size:0.7rem;color:var(--td)">${l.source}</td>
      <td style="font-family:monospace;font-size:0.68rem;color:var(--tm)">${l.date}</td>
      <td><span style="color:${l.labCompleted?'var(--gr)':'var(--tm)'};font-size:0.85rem">${l.labCompleted?'✓':'○'}</span></td>
      <td>${applied}</td>
      <td>${l.writeup?`<a href="${l.writeup}" target="_blank" style="color:var(--cy);font-size:0.68rem">↗</a>`:'—'}</td>
      <td><div style="display:flex;gap:0.22rem">
        <button class="btn bg2 btn-sm btn-i" onclick="openLearnM('${l.id}')">✎</button>
        <button class="btn bd btn-sm btn-i" onclick="del('learning','${l.id}')">✕</button>
      </div></td>
    </tr>`;}).join('');
}
function openLearnM(id){
  const l=id?S.learning.find(x=>x.id===id):null;
  const appliedStr=(l?.appliedIn||[]).map(fid=>{const f=S.findings.find(x=>x.id===fid);return f?f.title:null;}).filter(Boolean).join(', ');
  openM(l?'Edit Learning Entry':'Add Learning Entry',`
    <div class="fg">
      <div class="fgf"><label class="fl">Technique / Topic</label><input type="text" id="f-tech" value="${l?.technique||''}" placeholder="e.g. JWT Algorithm Confusion"></div>
      <div><label class="fl">Source</label><select id="f-src">${SOURCES.map(x=>`<option ${l?.source===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div><label class="fl">Date Studied</label><input type="date" id="f-dt" value="${l?.date||new Date().toISOString().slice(0,10)}"></div>
      <div><label class="fl">Lab Completed</label><select id="f-lab"><option value="true"${l?.labCompleted?' selected':''}>Yes</option><option value="false"${!l?.labCompleted?' selected':''}>No</option></select></div>
      <div class="fgf"><label class="fl">Writeup / Reference URL</label><input type="url" id="f-url" value="${l?.writeup||''}"></div>
      <div class="fgf">
        <label class="fl">Applied In (select findings)</label>
        <select id="f-applied" multiple style="min-height:80px">
          ${S.findings.map(f=>`<option value="${f.id}"${l?.appliedIn?.includes(f.id)?' selected':''}>${f.title}</option>`).join('')}
        </select>
        <div style="font-size:0.62rem;color:var(--tm);margin-top:0.2rem">Hold Ctrl/Cmd to select multiple</div>
      </div>
      <div class="fgf"><label class="fl">Notes</label><textarea id="f-nt">${l?.notes||''}</textarea></div>
    </div>
    <div class="fa"><button class="btn bg2" onclick="closeM()">Cancel</button><button class="btn bo" id="m-save">Save</button></div>`);
  document.getElementById('m-save').onclick=()=>{
    const sel=Array.from(document.getElementById('f-applied').selectedOptions).map(o=>o.value);
    const o={id:l?.id||uid(),technique:gv('f-tech'),source:gv('f-src'),date:gv('f-dt'),
      labCompleted:gv('f-lab')==='true',writeup:gv('f-url'),appliedIn:sel,notes:gv('f-nt')};
    if(!o.technique){toast('Technique required','var(--re)');return;}
    if(l){S.learning[S.learning.findIndex(x=>x.id===id)]=o;}else{S.learning.unshift(o);}
    save();closeM();rLearn();toast(l?'Updated':'Entry added');
  };
}

/* ═══════════════════════════════════════════════════════
   DELETE
═══════════════════════════════════════════════════════ */
function del(col,id){
  if(!confirm('Delete this item?'))return;
  S[col]=S[col].filter(x=>x.id!==id);
  save();nav(page);toast('Deleted','var(--re)');
}

/* ═══════════════════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════════════════ */
document.getElementById('exp-btn').onclick=()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));
  a.download='bugbounty-tracker-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('Exported!');
};
document.getElementById('imp-btn').onclick=()=>document.getElementById('imp-file').click();
document.getElementById('imp-file').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(!d.programs)throw 0;S=d;save();nav(page);toast('Imported!');}
    catch{toast('Invalid file','var(--re)');}
  };
  r.readAsText(f);e.target.value='';
};

/* ═══════════════════════════════════════════════════════
   EVENTS & INIT
═══════════════════════════════════════════════════════ */
document.querySelectorAll('.sb-a').forEach(a=>a.onclick=()=>nav(a.dataset.p));
document.getElementById('m-close').onclick=closeM;
document.getElementById('mo').onclick=e=>{if(e.target===document.getElementById('mo'))closeM();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

load();sbFoot();nav('dash');
</script>
</body>
</html>
