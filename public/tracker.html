*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;font-size:14px;line-height:1.6}

/* SIDEBAR */
#sb{width:var(--sw);min-height:100vh;background:rgba(0,0,0,0.35);border-right:1px solid var(--b);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sb-brand{padding:1.1rem 1.1rem 0.9rem;border-bottom:1px solid var(--b)}
.sb-brand-t{font-size:0.8rem;font-weight:900;color:var(--cy);letter-spacing:0.05em;text-transform:uppercase}
.sb-brand-s{font-size:0.62rem;color:var(--tm);margin-top:0.1rem}
.sb-nav{flex:1;padding:0.6rem 0;overflow-y:auto}
.sb-lbl{font-size:0.58rem;font-weight:800;color:var(--tm);text-transform:uppercase;letter-spacing:0.1em;padding:0.65rem 1.1rem 0.2rem}
.sb-a{display:flex;align-items:center;gap:0.55rem;padding:0.5rem 1.1rem;color:var(--td);font-size:0.8rem;font-weight:500;border-left:2px solid transparent;transition:all 0.14s;cursor:pointer;user-select:none}
.sb-a:hover{color:var(--t);background:var(--bg3)}
.sb-a.on{color:var(--cy);border-left-color:var(--cy);background:rgba(138,232,255,0.06)}
.sb-a-i{width:15px;text-align:center;font-size:0.85rem}
.sb-foot{padding:0.75rem 1.1rem;border-top:1px solid var(--b)}
.sb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.28rem}
.sb-rl{font-size:0.62rem;color:var(--tm)}
.sb-rv{font-size:0.68rem;font-weight:700;font-family:monospace}

/* MAIN */
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
#hdr{height:var(--hh);background:rgba(0,0,0,0.25);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
#hdr-t{font-size:0.95rem;font-weight:700}
.hdr-acts{display:flex;gap:0.5rem}
#cnt{padding:1.4rem 1.5rem;flex:1}

.btn{display:inline-flex;align-items:center;gap:0.35rem;padding:0.42rem 0.85rem;border-radius:var(--rs);font-size:0.76rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.14s;font-family:inherit;white-space:nowrap}
.bp{background:rgba(138,232,255,0.1);border-color:rgba(138,232,255,0.32);color:var(--cy)}
.bp:hover{background:rgba(138,232,255,0.18);border-color:var(--cy)}
.bg{background:transparent;border-color:var(--b);color:var(--td)}
.bg:hover{border-color:var(--bh);color:var(--t)}
.bd{background:rgba(255,85,85,0.08);border-color:rgba(255,85,85,0.28);color:var(--re)}
.bd:hover{background:rgba(255,85,85,0.15)}
.bs{background:rgba(80,250,123,0.08);border-color:rgba(80,250,123,0.28);color:var(--gr)}
.bs:hover{background:rgba(80,250,123,0.15)}
.btn-sm{padding:0.28rem 0.6rem;font-size:0.7rem}
.btn-i{padding:0.3rem 0.4rem}

.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:1.1rem;transition:border-color 0.18s}
.card:hover{border-color:var(--bh)}
.c-lbl{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--tm);margin-bottom:0.4rem}
.c-val{font-size:1.9rem;font-weight:900;font-family:monospace;line-height:1}
.c-sub{font-size:0.67rem;color:var(--tm);margin-top:0.3rem}

/* GRIDS */
.stat-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem;margin-bottom:1.4rem}
.two-c{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

/* SECTION HDR */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;flex-wrap:wrap;gap:0.4rem}
.sh-t{font-size:0.85rem;font-weight:700}

.fb{display:flex;gap:0.55rem;margin-bottom:0.85rem;flex-wrap:wrap}

input:focus,select:focus,textarea:focus{border-color:var(--bh)}
select option{background:#0d1b2a}
textarea{resize:vertical;min-height:72px}
.si{min-width:190px;width:auto}
.fs{width:auto}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.78rem}
thead th{text-align:left;padding:0.55rem 0.7rem;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--tm);border-bottom:1px solid var(--b);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.1s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:0.65rem 0.7rem;vertical-align:middle}
tbody tr:last-child{border:none}

.b{display:inline-flex;align-items:center;padding:0.16rem 0.5rem;border-radius:4px;font-size:0.62rem;font-weight:700;white-space:nowrap}
.bc{background:rgba(255,85,85,0.14);color:#ff5555;border:1px solid rgba(255,85,85,0.28)}
.bh2{background:rgba(255,184,108,0.14);color:#ffb86c;border:1px solid rgba(255,184,108,0.28)}
.bm{background:rgba(241,250,140,0.1);color:#f1fa8c;border:1px solid rgba(241,250,140,0.22)}
.bl{background:rgba(80,250,123,0.1);color:#50fa7b;border:1px solid rgba(80,250,123,0.22)}
.bi{background:rgba(138,232,255,0.1);color:#8ae8ff;border:1px solid rgba(138,232,255,0.22)}
.bpu{background:rgba(189,147,249,0.1);color:#bd93f9;border:1px solid rgba(189,147,249,0.22)}
.bgr{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.08)}

.sk-row{display:flex;align-items:center;gap:0.65rem;padding:0.45rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sk-n{min-width:150px;font-size:0.78rem;font-weight:500}
.sk-t{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.sk-f{height:100%;border-radius:2px;transition:width 0.5s ease}
.sk-lv{min-width:95px;font-size:0.65rem;text-align:right}
.sk-ev{font-size:0.6rem;color:var(--tm);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-b{background:linear-gradient(90deg,#556677,#667788)}
.p-i{background:linear-gradient(90deg,#ffb86c,#ffd080)}
.p-a{background:linear-gradient(90deg,#50fa7b,#8ae8ff)}
.p-e{background:linear-gradient(90deg,#8ae8ff,#bd93f9)}

.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:0.75rem}
.cc{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:1rem;transition:border-color 0.18s;border-left-width:3px}
.cc:hover{border-color:var(--bh)}
.cc-n{font-size:0.85rem;font-weight:700;margin:0.4rem 0 0.2rem}
.cc-i{font-size:0.7rem;color:var(--tm);margin-bottom:0.55rem}
.cc-f{display:flex;justify-content:space-between;align-items:center;margin-top:0.7rem;padding-top:0.7rem;border-top:1px solid var(--b)}
.cc-d{font-size:0.62rem;color:var(--tm);font-family:monospace}

.ml-i{display:flex;align-items:center;gap:0.35rem}
.ml-d{width:9px;height:9px;border-radius:2px}

#mb{background:#0d1b2a;border:1px solid var(--bh);border-radius:var(--r);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:1.4rem;position:relative}
.m-t{font-size:0.95rem;font-weight:700;color:var(--cy);margin-bottom:1.1rem;padding-bottom:0.65rem;border-bottom:1px solid var(--b)}
.m-x{position:absolute;top:0.9rem;right:0.9rem;background:none;border:none;color:var(--td);font-size:1.1rem;cursor:pointer;padding:0.2rem 0.35rem;border-radius:4px}
.m-x:hover{color:var(--t);background:rgba(255,255,255,0.06)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.fgf{grid-column:1/-1}
.fl{font-size:0.65rem;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:0.25rem}
.fa{display:flex;justify-content:flex-end;gap:0.5rem;margin-top:1.1rem;padding-top:0.65rem;border-top:1px solid var(--b)}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tm)}
.empty-i{font-size:2rem;margin-bottom:0.6rem;opacity:0.35}

/* TOOL TAG */
.tt{display:inline-flex;padding:0.12rem 0.4rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:3px;font-size:0.6rem;color:var(--td);margin:0.1rem}

.dh{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--cy);margin-bottom:0.5rem;padding-bottom:0.35rem;border-bottom:1px solid var(--b)}

@media(max-width:600px){#cnt{padding:1rem}.mg{grid-template-columns:repeat(2,1fr)}.stat-g{grid-template-columns:repeat(2,1fr)}}

const KEY='cst_v1';

function load(){
  try{

/* ── TOAST ──────────────────────────────────────────────── */
let toastT;
function toast(msg,col){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.color=col||'var(--gr)'; el.style.borderColor=col||'var(--gr)';
  el.classList.add('on'); clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('on'),2400);
}

function sevB(s){
  const m={critical:'bc',high:'bh2',medium:'bm',low:'bl',info:'bi'};
  return `<span class="b ${m[s.toLowerCase()]||'bi'}">${s}</span>`;
}
function stB(s){
  const m={Open:'bc','In Progress':'bh2',Resolved:'bl',Accepted:'bpu','False Positive':'bgr',Active:'bl',Completed:'bi',Planning:'bi','On Hold':'bgr',Earned:'bl',Expired:'bc',Planned:'bi'};
  return `<span class="b ${m[s]||'bi'}">${s}</span>`;
}
function catB(c){
  const m={SOC:'bi',IAM:'bpu',GRC:'bm','Bug Bounty':'bh2',Pentest:'bc','Detection Eng':'bl','Cloud Security':'bi'};
  return `<span class="b ${m[c]||'bi'}">${c}</span>`;
}

/* ── DASHBOARD ──────────────────────────────────────────── */
function rDash(){
  const c=document.getElementById('cnt');
  const tot=TACTICS.reduce((a,t)=>a+t.tech.length,0);
  const cov=Object.values(S.mitre).filter(v=>v==='detected'||v==='tested').length;
  const pct=Math.round(cov/tot*100);
  const open=S.findings.filter(f=>f.status==='Open').length;
  const ch=S.findings.filter(f=>['critical','high'].includes(f.severity.toLowerCase())).length;
  const act=S.projects.filter(p=>p.status==='Active').length;
  const ec=S.certs.filter(c=>c.status==='Earned').length;
  const res=S.findings.filter(f=>f.status==='Resolved').length;
  const risk=Math.min(100,
    S.findings.filter(f=>f.status==='Open'&&f.severity==='critical').length*20+
    S.findings.filter(f=>f.status==='Open'&&f.severity==='high').length*10+
    open*2
  );
  const rc=[
    ...S.projects.map(p=>({ico:'◈',t:p.title,m:p.category,d:p.date,col:'var(--cy)'})),
    ...S.findings.map(f=>({ico:'⚠',t:f.title,m:f.severity,d:f.date,col:f.severity==='critical'?'var(--re)':f.severity==='high'?'var(--or)':'var(--ye)'})),
  ].sort((a,b)=>b.d.localeCompare(a.d)).slice(0,5);

  c.innerHTML=`
    <div class="stat-g">
      <div class="card"><div class="c-lbl">Active Projects</div><div class="c-val" style="color:var(--cy)">${act}</div><div class="c-sub">${S.projects.length} total</div></div>
      <div class="card"><div class="c-lbl">Open Findings</div><div class="c-val" style="color:${open?'var(--re)':'var(--gr)'}">${open}</div><div class="c-sub">${ch} critical / high</div></div>
      <div class="card"><div class="c-lbl">Risk Score</div><div class="c-val" style="color:${risk>60?'var(--re)':risk>30?'var(--or)':'var(--gr)'}">${risk}</div><div class="c-sub">Based on open findings</div></div>
      <div class="card"><div class="c-lbl">ATT&CK Coverage</div><div class="c-val" style="color:var(--gr)">${pct}%</div><div class="c-sub">${cov}/${tot} techniques</div></div>
      <div class="card"><div class="c-lbl">Certs Earned</div><div class="c-val" style="color:var(--cy)">${ec}</div><div class="c-sub">${S.certs.length} tracked</div></div>
      <div class="card"><div class="c-lbl">Findings Resolved</div><div class="c-val" style="color:var(--gr)">${res}</div><div class="c-sub">of ${S.findings.length} total</div></div>
    </div>
    <div class="two-c">
      <div>
        <div class="sh"><span class="sh-t">Recent Activity</span></div>
        ${rc.map(r=>`<div class="ri"><span class="ri-i" style="color:${r.col}">${r.ico}</span><div class="ri-body"><div class="ri-t">${r.t}</div><div class="ri-m">${r.m}</div></div><div class="ri-d">${r.d}</div></div>`).join('')||'<div class="empty"><div class="empty-i">○</div><p>No activity yet</p></div>'}
      </div>
      <div>
        <div class="sh"><span class="sh-t">Severity Breakdown</span></div>
        <div class="card" style="padding:1rem;">
          ${SEVS.map(sv=>{
            const n=S.findings.filter(f=>f.severity.toLowerCase()===sv).length;
            const p=S.findings.length?Math.round(n/S.findings.length*100):0;
            const col={critical:'var(--re)',high:'var(--or)',medium:'var(--ye)',low:'var(--gr)',info:'var(--cy)'}[sv];
            return `<div style="margin-bottom:0.55rem"><div style="display:flex;justify-content:space-between;font-size:0.7rem;margin-bottom:0.2rem"><span style="text-transform:capitalize;color:${col}">${sv}</span><span style="font-family:monospace;color:var(--tm)">${n}</span></div><div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden"><div style="width:${p}%;height:100%;background:${col};border-radius:2px"></div></div></div>`;
          }).join('')}
        </div>
        <div class="sh" style="margin-top:1rem"><span class="sh-t">ATT&CK by Tactic</span><span onclick="nav('mitre')" style="font-size:0.7rem;color:var(--cy);cursor:pointer">Full Map →</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">
          ${TACTICS.map(t=>{
            const tc=t.tech.filter(x=>{const s=S.mitre[t.id+':'+x.id];return s==='detected'||s==='tested';}).length;
            const p2=Math.round(tc/t.tech.length*100);
            const col=p2>=75?'var(--gr)':p2>=40?'var(--or)':'var(--re)';
            return `<div style="background:var(--bg2);border:1px solid var(--b);border-radius:6px;padding:0.4rem 0.55rem;text-align:center;cursor:pointer;min-width:72px;" onclick="nav('mitre')" title="${t.n}: ${tc}/${t.tech.length}">
              <div style="font-size:0.58rem;color:var(--tm);margin-bottom:0.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px">${t.n}</div>
              <div style="font-size:0.88rem;font-weight:800;color:${col};font-family:monospace">${p2}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

      <select class="fs" id="sdom" onchange="rSkillRows()">${['<option value="">All Domains</option>',...DOMS.map(x=>`<option>${x}</option>`)].join('')}</select>
      <select class="fs" id="slv" onchange="rSkillRows()">${['<option value="">All Levels</option>',...PROFS.map(x=>`<option>${x}</option>`)].join('')}</select>
      <button class="btn bp" onclick="openSkillM()">+ Add Skill</button>
    </div>
    <div class="card"><div id="sk-rows"></div></div>`;
  rSkillRows();
}
function rSkillRows(){
  const q=gv('sq').toLowerCase(),dom=gv('sdom'),lv=gv('slv');
  const rows=S.skills.filter(s=>
    (!q||s.skill.toLowerCase().includes(q))&&(!dom||s.domain===dom)&&(!lv||s.level===lv)
  );
  const el=document.getElementById('sk-rows');
  if(!el)return;
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="empty-i">◎</div><p>No skills found</p></div>`;return;}
  const grp={};
  rows.forEach(s=>{if(!grp[s.domain])grp[s.domain]=[];grp[s.domain].push(s);});
  el.innerHTML=Object.entries(grp).map(([dom,skills])=>`
    <div style="margin-bottom:1.1rem">
      <div class="dh">${dom}</div>
      ${skills.map(s=>`
        <div class="sk-row">
          <div class="sk-n">${s.skill}</div>
          <div class="sk-t"><div class="sk-f ${profCls[s.level]}" style="width:${profPct[s.level]}%"></div></div>
          <div class="sk-lv" style="color:${profCol[s.level]}">${s.level}</div>
          <div class="sk-ev" title="${s.evidence}">${s.evidence}</div>
          <div style="display:flex;gap:0.25rem;flex-shrink:0">
            <button class="btn bg btn-sm btn-i" onclick="openSkillM('${s.id}')">✎</button>
            <button class="btn bd btn-sm btn-i" onclick="del('skills','${s.id}')">✕</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}
function openSkillM(id){
  const s=id?S.skills.find(x=>x.id===id):null;
  openM(s?'Edit Skill':'Add Skill',`
    <div class="fg">
      <div class="fgf"><label class="fl">Skill Name</label><input type="text" id="f-sk" value="${s?.skill||''}"></div>
      <div><label class="fl">Domain</label><select id="f-dom">${DOMS.map(x=>`<option ${s?.domain===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div><label class="fl">Proficiency</label><select id="f-lv">${PROFS.map(x=>`<option ${s?.level===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="fgf"><label class="fl">Evidence / Where Used</label><input type="text" id="f-ev" value="${s?.evidence||''}"></div>
      <div class="fgf"><label class="fl">Notes</label><textarea id="f-n">${s?.notes||''}</textarea></div>
    </div>
    <div class="fa"><button class="btn bg" onclick="closeM()">Cancel</button><button class="btn bp" id="m-save">Save</button></div>`,
  ()=>{
    const o={id:s?.id||uid(),skill:gv('f-sk'),domain:gv('f-dom'),level:gv('f-lv'),evidence:gv('f-ev'),notes:gv('f-n')};
    if(!o.skill){toast('Skill name required','var(--re)');return;}
    if(s){S.skills[S.skills.findIndex(x=>x.id===id)]=o;}else{S.skills.push(o);}
    save();closeM();rSkills();toast(s?'Updated':'Added');
  });
}

/* ── CERTIFICATIONS ─────────────────────────────────────── */
function rCerts(){
  const c=document.getElementById('cnt');
  c.innerHTML=`
    <div class="fb">
      <select class="fs" id="cst" onchange="rCertCards()">${['<option value="">All Status</option>',...CSTATS.map(x=>`<option>${x}</option>`)].join('')}</select>
      <button class="btn bp" onclick="openCertM()">+ Add Certification</button>
    </div>
    <div class="cg" id="cert-grid"></div>`;
  rCertCards();
}
function rCertCards(){
  const st=gv('cst');
  const ord={Earned:0,'In Progress':1,Planned:2,Expired:3};
  const rows=[...S.certs.filter(c=>!st||c.status===st)].sort((a,b)=>ord[a.status]-ord[b.status]);
  const el=document.getElementById('cert-grid');
  if(!el)return;
  if(!rows.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-i">✦</div><p>No certs found</p></div>`;return;}
  const cols={Earned:'var(--gr)','In Progress':'var(--or)',Planned:'var(--cy)',Expired:'var(--re)'};
  el.innerHTML=rows.map(ct=>`
    <div class="cc" style="border-left-color:${cols[ct.status]||'var(--b)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        ${stB(ct.status)}
        <div style="display:flex;gap:0.25rem">
          <button class="btn bg btn-sm btn-i" onclick="openCertM('${ct.id}')">✎</button>
          <button class="btn bd btn-sm btn-i" onclick="del('certs','${ct.id}')">✕</button>
        </div>
      </div>
      <div class="cc-n">${ct.name}</div>
      <div class="cc-i">${ct.issuer}</div>
      <div class="cc-f">
        <div class="cc-d">${ct.earned?'Earned: '+ct.earned:ct.target?'Target: '+ct.target:'No date set'}${ct.expiry?'<br>Expires: '+ct.expiry:''}</div>
        ${ct.badge?`<a href="${ct.badge}" target="_blank" class="btn bg btn-sm">Verify ↗</a>`:''}
      </div>
    </div>`).join('');
}
function openCertM(id){
  const ct=id?S.certs.find(x=>x.id===id):null;
  openM(ct?'Edit Certification':'Add Certification',`
    <div class="fg">
      <div class="fgf"><label class="fl">Certification Name</label><input type="text" id="f-n" value="${ct?.name||''}"></div>
      <div><label class="fl">Issuer</label><input type="text" id="f-i" value="${ct?.issuer||''}"></div>
      <div><label class="fl">Status</label><select id="f-s">${CSTATS.map(x=>`<option ${ct?.status===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div><label class="fl">Earned Date</label><input type="date" id="f-e" value="${ct?.earned||''}"></div>
      <div><label class="fl">Expiry Date</label><input type="date" id="f-ex" value="${ct?.expiry||''}"></div>
      <div><label class="fl">Target Date</label><input type="date" id="f-tg" value="${ct?.target||''}"></div>
      <div class="fgf"><label class="fl">Badge / Credly URL</label><input type="url" id="f-b" value="${ct?.badge||''}"></div>
    </div>
    <div class="fa"><button class="btn bg" onclick="closeM()">Cancel</button><button class="btn bp" id="m-save">Save</button></div>`,
  ()=>{
    const o={id:ct?.id||uid(),name:gv('f-n'),issuer:gv('f-i'),status:gv('f-s'),earned:gv('f-e'),expiry:gv('f-ex'),target:gv('f-tg'),badge:gv('f-b')};
    if(!o.name){toast('Name required','var(--re)');return;}
    if(ct){S.certs[S.certs.findIndex(x=>x.id===id)]=o;}else{S.certs.unshift(o);}
    save();closeM();rCerts();toast(ct?'Updated':'Added');
  });
}

/* ── MITRE ──────────────────────────────────────────────── */
function rMitre(){
  const c=document.getElementById('cnt');
  const tot=TACTICS.reduce((a,t)=>a+t.tech.length,0);
  const det=Object.values(S.mitre).filter(v=>v==='detected').length;
  const tst=Object.values(S.mitre).filter(v=>v==='tested').length;
  const inp=Object.values(S.mitre).filter(v=>v==='in-progress').length;
  const pct=Math.round((det+tst)/tot*100);
  c.innerHTML=`
    <div class="stat-g" style="grid-template-columns:repeat(4,1fr);margin-bottom:1rem">
      <div class="card"><div class="c-lbl">Coverage</div><div class="c-val" style="color:var(--gr)">${pct}%</div><div class="c-sub">${det+tst}/${tot} techniques</div></div>
      <div class="card"><div class="c-lbl">Detected</div><div class="c-val" style="color:var(--gr)">${det}</div><div class="c-sub">Wazuh · Suricata · Sysmon</div></div>
      <div class="card"><div class="c-lbl">Tested</div><div class="c-val" style="color:var(--cy)">${tst}</div><div class="c-sub">Purple team / VECTR</div></div>
      <div class="card"><div class="c-lbl">In Progress</div><div class="c-val" style="color:var(--or)">${inp}</div><div class="c-sub">Being implemented</div></div>
    </div>
    <div class="ml">
      <div class="ml-i"><div class="ml-d" style="background:rgba(80,250,123,0.4)"></div><span style="color:var(--gr)">Detected</span></div>
      <div class="ml-i"><div class="ml-d" style="background:rgba(138,232,255,0.3)"></div><span style="color:var(--cy)">Tested (Purple Team)</span></div>
      <div class="ml-i"><div class="ml-d" style="background:rgba(255,184,108,0.3)"></div><span style="color:var(--or)">In Progress</span></div>
      <div class="ml-i"><div class="ml-d" style="background:rgba(255,255,255,0.06)"></div><span style="color:var(--tm)">Not Covered</span></div>
      <span style="margin-left:auto;font-size:0.65rem;color:var(--tm)">Click technique to cycle status</span>
    </div>
    <div class="mg">
      ${TACTICS.map(t=>`
        <div class="mt">
          <div class="mt-h">${t.n}<br><span style="opacity:0.45;font-weight:400;font-size:0.5rem">${t.id}</span></div>
          <div class="mt-b">
            ${t.tech.map(x=>{
              const k=t.id+':'+x.id;
              const st=S.mitre[k]||'not-covered';
              return `<div class="mt-c s-${st}" onclick="cycleM('${k}')" title="${x.id} — ${x.n}&#10;Click to cycle status"><div class="mt-id">${x.id}</div><div class="mt-nm">${x.n}</div></div>`;
            }).join('')}
          </div>
        </div>`).join('')}
    </div>
    <div style="font-size:0.67rem;color:var(--tm);margin-top:0.4rem">
      ↗ <a href="https://mitre-attack.github.io/attack-navigator/" target="_blank" style="color:var(--cy)">Open ATT&CK Navigator</a>
      &nbsp;·&nbsp;
      <a href="assets/docs/mitre-layer.json" download style="color:var(--cy)">Download Navigator Layer</a>
    </div>`;
}
function cycleM(k){
  const cur=S.mitre[k]||'not-covered';
  const next=MSTATUSES[(MSTATUSES.indexOf(cur)+1)%MSTATUSES.length];
  if(next==='not-covered') delete S.mitre[k]; else S.mitre[k]=next;
  save();rMitre();
}

/* ── DELETE ─────────────────────────────────────────────── */
function del(col,id){
  if(!confirm('Delete this item?'))return;
  S[col]=S[col].filter(x=>x.id!==id);
  save();nav(page);toast('Deleted','var(--re)');
}

/* ── EXPORT / IMPORT ────────────────────────────────────── */
document.getElementById('exp-btn').onclick=()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));
  a.download='cybersec-tracker-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('Exported!');
};
document.getElementById('imp-btn').onclick=()=>document.getElementById('imp-file').click();
document.getElementById('imp-file').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.projects)throw new Error();
      S=d; if(!S.mitre||!Object.keys(S.mitre).length)S.mitre=mkMitre();
      save(); nav(page); toast('Imported!');
    }catch{toast('Invalid file','var(--re)');}
  };
  r.readAsText(f); e.target.value='';
};

/* ── EVENTS ─────────────────────────────────────────────── */
document.querySelectorAll('.sb-a').forEach(a=>a.onclick=()=>nav(a.dataset.p));
document.getElementById('m-close').onclick=closeM;
document.getElementById('mo').onclick=e=>{if(e.target===document.getElementById('mo'))closeM();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

/* ── INIT ───────────────────────────────────────────────── */
load(); sbFoot(); nav('dashboard');
</script>
</body>
</html>
