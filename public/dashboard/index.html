<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Tracker Dashboard — Subash Lama</title>
  <style>
    :root { --bg:#07111c; --panel:#0d1e2e; --accent:#00ff88; --text:#e0e0e0; --muted:#6b7a8d; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }

    #login { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { background:var(--panel); padding:40px; border-radius:12px; text-align:center; width:320px; border:1px solid #1a2a3a; }
    .login-box h1 { color:var(--accent); margin-bottom:8px; font-size:1.4rem; }
    .login-box p  { color:var(--muted); font-size:0.85rem; margin-bottom:24px; }
    input[type=password] { width:100%; padding:12px; background:#0a1828; border:1px solid #1a3a5a; border-radius:8px; color:var(--text); font-size:1rem; margin-bottom:12px; }
    .btn { width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:700; font-size:1rem; cursor:pointer; }
    .btn:hover { opacity:0.9; }
    #err { color:#ff4444; font-size:0.85rem; margin-top:8px; }

    #app { display:none; padding:20px; max-width:900px; margin:0 auto; }
    header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid #1a2a3a; }
    header h1 { color:var(--accent); font-size:1.3rem; }
    header span { color:var(--muted); font-size:0.8rem; }

    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
    .stat { background:var(--panel); border-radius:10px; padding:20px; border:1px solid #1a2a3a; text-align:center; }
    .stat .num { font-size:2.2rem; font-weight:700; color:var(--accent); }
    .stat .lbl { font-size:0.8rem; color:var(--muted); margin-top:4px; }

    .section { background:var(--panel); border-radius:10px; padding:20px; margin-bottom:16px; border:1px solid #1a2a3a; }
    .section h2 { font-size:1rem; color:var(--accent); margin-bottom:16px; }

    table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    th { color:var(--muted); text-align:left; padding:6px 8px; border-bottom:1px solid #1a2a3a; font-weight:500; }
    td { padding:8px; border-bottom:1px solid #0d1e2e; vertical-align:top; }
    tr:hover td { background:#0a1828; }
    .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.72rem; font-weight:600; }
    .hot  { background:#ff440022; color:#ff6644; border:1px solid #ff440044; }
    .warm { background:#ffaa0022; color:#ffcc44; border:1px solid #ffaa0044; }
    .norm { background:#00ff8822; color:#00ff88; border:1px solid #00ff8844; }

    .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:0.82rem; }
    .bar-label { width:140px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { flex:1; background:#0a1828; border-radius:4px; height:8px; }
    .bar-fill  { background:var(--accent); height:8px; border-radius:4px; transition:width 0.6s; }
    .bar-count { width:30px; text-align:right; color:var(--muted); font-size:0.78rem; }

    .loading { text-align:center; padding:40px; color:var(--muted); }
    .refresh-btn { background:none; border:1px solid var(--accent); color:var(--accent); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:0.8rem; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <h1>Resume Tracker</h1>
    <p>Private dashboard — Subash Lama</p>
    <input type="password" id="pwd" placeholder="Enter password" onkeydown="if(event.key==='Enter')auth()" autofocus />
    <button class="btn" onclick="auth()">Access Dashboard</button>
    <div id="err"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="app">
  <header>
    <h1>📊 Resume Download Tracker</h1>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="lastUpdated"></span>
      <button class="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </header>

  <div class="stats" id="statsGrid">
    <div class="stat"><div class="num" id="statTotal">—</div><div class="lbl">Total Downloads</div></div>
    <div class="stat"><div class="num" id="statToday">—</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="num" id="statWeek">—</div><div class="lbl">This Week</div></div>
    <div class="stat"><div class="num" id="statCountries">—</div><div class="lbl">Countries</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="section">
      <h2>Top Countries</h2>
      <div id="countryBars"><div class="loading">Loading...</div></div>
    </div>
    <div class="section">
      <h2>Top Companies</h2>
      <div id="companyBars"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <div class="section">
    <h2>Recent Downloads</h2>
    <div id="recentTable"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
  const PASS_HASH = "69130741d88c9e73ce2870fc83d61077cbc6c3523c1b5cec9189925104268d20"; // sha256 of dashboard password
  const LOG_URL   = "https://raw.githubusercontent.com/Subash107/SubashLamaProfile/main/download-logs/resume-downloads.txt";

  async function sha256(msg) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
  }

  async function auth() {
    const pwd = document.getElementById("pwd").value;
    const h   = await sha256(pwd);
    if (h === PASS_HASH) {
      sessionStorage.setItem("dash_auth", "1");
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display   = "block";
      loadData();
    } else {
      document.getElementById("err").textContent = "Incorrect password.";
    }
  }

  if (sessionStorage.getItem("dash_auth") === "1") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display   = "block";
    loadData();
  }

  async function loadData() {
    try {
      const res  = await fetch(LOG_URL + "?t=" + Date.now());
      const text = await res.text();
      parseAndRender(text);
      document.getElementById("lastUpdated").textContent = "Updated " + new Date().toLocaleTimeString();
    } catch(e) {
      console.error(e);
    }
  }

  function parseAndRender(text) {
    const lines = text.split("\n").filter(l => /^\d{4}-\d{2}-\d{2}/.test(l));
    const today = new Date().toISOString().slice(0,10);
    const weekAgo = new Date(Date.now() - 7*864e5).toISOString().slice(0,10);

    const entries = lines.map(l => {
      const p = l.split("|").map(x => x.trim());
      return { ts: p[0]||"", ip: p[1]||"", location: p[2]||"", org: p[3]||"", os: p[4]||"", browser: p[5]||"", device: p[6]||"", ref: p[7]||"" };
    });

    // Stats
    const todayCount = entries.filter(e => e.ts.startsWith(today)).length;
    const weekCount  = entries.filter(e => e.ts >= weekAgo).length;
    const countries  = new Set(entries.map(e => e.location.split(",").pop().trim()).filter(Boolean)).size;
    document.getElementById("statTotal").textContent     = entries.length;
    document.getElementById("statToday").textContent     = todayCount;
    document.getElementById("statWeek").textContent      = weekCount;
    document.getElementById("statCountries").textContent = countries;

    // Country bars
    const cMap = {};
    entries.forEach(e => { const c = e.location.split(",").pop().trim() || "Unknown"; cMap[c] = (cMap[c]||0)+1; });
    renderBars("countryBars", cMap, entries.length);

    // Company bars
    const oMap = {};
    entries.forEach(e => { const o = e.org || "Unknown"; oMap[o] = (oMap[o]||0)+1; });
    renderBars("companyBars", oMap, entries.length);

    // Recent table
    const recent = [...entries].reverse().slice(0, 15);
    const rows = recent.map(e => {
      const org = e.org || "Unknown";
      const score = org.match(/microsoft|google|amazon|cisco|ibm|palo alto|crowdstrike|deloitte|accenture/i)
        ? '<span class="badge hot">HOT</span>'
        : org.match(/bank|security|telecom|technology/i)
        ? '<span class="badge warm">WARM</span>'
        : '<span class="badge norm">NEW</span>';
      return "<tr><td>" + score + "</td><td>" + e.ts.slice(0,16).replace("T"," ") + "</td><td>" + e.location + "</td><td>" + (e.org||"—") + "</td><td>" + (e.browser||"—") + "/" + (e.device||"—") + "</td></tr>";
    }).join("");
    document.getElementById("recentTable").innerHTML =
      "<table><thead><tr><th>Score</th><th>Time (UTC)</th><th>Location</th><th>Company</th><th>Device</th></tr></thead><tbody>" + rows + "</tbody></table>";
  }

  function renderBars(id, map, total) {
    const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const max    = sorted[0]?.[1] || 1;
    const html   = sorted.map(([k,v]) =>
      '<div class="bar-row"><div class="bar-label" title="'+k+'">'+k+'</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(v/max*100)+'%"></div></div>' +
      '<div class="bar-count">'+v+'</div></div>'
    ).join("") || "<div style='color:var(--muted);font-size:0.85rem'>No data yet</div>";
    document.getElementById(id).innerHTML = html;
  }
</script>
</body>
</html>
