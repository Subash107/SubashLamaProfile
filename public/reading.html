<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reading List — Subash Lama. Cybersecurity books, frameworks, and resources with personal takeaways." />
  <title>Reading List — Subash Lama</title>
  <style>
    :root { --bg:#07111c; --panel:#0d1e2e; --accent:#00ff88; --blue:#5dcfff; --yellow:#ffcc44; --text:#e0e0e0; --muted:#6b7a8d; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; padding:24px 20px; max-width:860px; margin:0 auto; }
    a { color:var(--accent); text-decoration:none; }

    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; padding-bottom:14px; border-bottom:1px solid #1a2a3a; flex-wrap:wrap; gap:10px; }
    .top-bar h1 { color:var(--accent); font-size:1.2rem; }
    .back-link { color:var(--muted); font-size:0.82rem; }

    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:4px 14px; font-size:0.76rem; color:var(--muted); cursor:pointer; transition:all 0.18s; }
    .filter-btn:hover, .filter-btn.active { background:rgba(0,255,136,0.1); border-color:rgba(0,255,136,0.3); color:var(--accent); }

    .books-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
    .book-card  { background:var(--panel); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:18px; display:flex; flex-direction:column; gap:8px; transition:border-color 0.18s; }
    .book-card:hover { border-color:rgba(0,255,136,0.25); }
    .book-status-read    { border-left:3px solid var(--accent); }
    .book-status-reading { border-left:3px solid var(--blue); }
    .book-status-planned { border-left:3px solid rgba(255,255,255,0.15); }

    .book-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .book-title  { font-size:0.88rem; font-weight:700; color:rgba(255,255,255,0.9); line-height:1.4; }
    .book-rating { font-size:0.8rem; color:var(--yellow); white-space:nowrap; }
    .book-author { font-size:0.76rem; color:var(--muted); }
    .book-meta   { display:flex; gap:6px; flex-wrap:wrap; }
    .book-tag    { display:inline-block; padding:1px 8px; border-radius:10px; font-size:0.66rem; font-weight:600; }
    .tag-cat     { background:rgba(0,255,136,0.08); color:var(--accent); border:1px solid rgba(0,255,136,0.18); }
    .tag-read    { background:rgba(0,255,136,0.1); color:var(--accent); border:1px solid rgba(0,255,136,0.22); }
    .tag-reading { background:rgba(93,207,255,0.1); color:var(--blue); border:1px solid rgba(93,207,255,0.2); }
    .tag-planned { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid rgba(255,255,255,0.1); }
    .book-takeaway { font-size:0.78rem; color:rgba(255,255,255,0.52); line-height:1.55; font-style:italic; margin-top:2px; }
    .book-takeaway::before { content:'"'; color:var(--accent); }
    .book-takeaway::after  { content:'"'; color:var(--accent); }

    .stats { display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
    .stat  { font-size:0.82rem; color:var(--muted); }
    .stat strong { color:var(--accent); }
    .loading { text-align:center; padding:40px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>
      <h1>Reading List</h1>
      <p style="color:var(--muted);font-size:0.78rem;margin-top:3px">Cybersecurity books with personal takeaways — updated as I read</p>
    </div>
    <a class="back-link" href="index.html">&larr; Portfolio</a>
  </div>

  <div class="stats" id="readStats"></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterBooks('all', this)">All</button>
    <button class="filter-btn" onclick="filterBooks('read', this)">Read</button>
    <button class="filter-btn" onclick="filterBooks('reading', this)">Reading Now</button>
    <button class="filter-btn" onclick="filterBooks('planned', this)">Planned</button>
    <button class="filter-btn" onclick="filterBooks('SOC', this)">SOC</button>
    <button class="filter-btn" onclick="filterBooks('GRC', this)">GRC</button>
  </div>

  <div class="books-grid" id="booksGrid"><div class="loading">Loading reading list...</div></div>

  <script>
    let allBooks = [];
    let currentFilter = 'all';

    function stars(n) { return n ? '★'.repeat(n) + '☆'.repeat(5-n) : ''; }

    function renderBooks(books) {
      const grid = document.getElementById('booksGrid');
      if (!books.length) { grid.innerHTML = '<div class="loading">No books match this filter.</div>'; return; }
      grid.innerHTML = books.map(b => {
        const statusTag = b.status === 'read' ? '<span class="book-tag tag-read">Read</span>' :
                          b.status === 'reading' ? '<span class="book-tag tag-reading">Reading</span>' :
                          '<span class="book-tag tag-planned">Planned</span>';
        return '<div class="book-card book-status-' + b.status + '">' +
          '<div class="book-header">' +
          '<div class="book-title">' + b.title + '</div>' +
          (b.rating ? '<div class="book-rating">' + stars(b.rating) + '</div>' : '') +
          '</div>' +
          '<div class="book-author">' + b.author + '</div>' +
          '<div class="book-meta">' +
          '<span class="book-tag tag-cat">' + b.category + '</span>' + statusTag +
          '</div>' +
          (b.takeaway ? '<div class="book-takeaway">' + b.takeaway + '</div>' : '') +
          '</div>';
      }).join('');
    }

    function filterBooks(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const filtered = filter === 'all' ? allBooks :
                       ['read','reading','planned'].includes(filter) ? allBooks.filter(b => b.status === filter) :
                       allBooks.filter(b => b.category === filter);
      renderBooks(filtered);
    }

    fetch('data/reading-list.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        allBooks = data.books || [];
        const read = allBooks.filter(b => b.status === 'read').length;
        const reading = allBooks.filter(b => b.status === 'reading').length;
        document.getElementById('readStats').innerHTML =
          '<span class="stat"><strong>' + read + '</strong> read</span>' +
          '<span class="stat"><strong>' + reading + '</strong> reading now</span>' +
          '<span class="stat"><strong>' + (allBooks.length-read-reading) + '</strong> planned</span>' +
          '<span class="stat">Updated ' + (data.updated||'') + '</span>';
        renderBooks(allBooks);
      })
      .catch(() => document.getElementById('booksGrid').innerHTML = '<div class="loading">Could not load reading list.</div>');
  </script>
</body>
</html>
